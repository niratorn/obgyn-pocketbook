<text text-anchor="middle" x="389" y="-487.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• U/S ประเมินอายุครรภ์ น้ำหนัก ปริมาณน้ำคร่ำ ส่วนนำ การเจริญเติบโต ความผิดปกติ</text>
<text text-anchor="middle" x="389" y="-473.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• เพาะเชื้อจากปัสสาวะ ช่องคลอด และทวารหนัก</text>
<text text-anchor="middle" x="389" y="-459.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• ตรวจ CBC</text>
<text text-anchor="middle" x="389" y="-445.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• fetal surveillance เช่น CTG กรณี GA ≥ 28 สัปดาห์</text>
</g>
