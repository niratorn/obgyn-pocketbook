<text text-anchor="middle" x="564.5" y="-474.4" font-family="Sarabun" font-size="12.00">• U/S ประเมินอายุครรภ์ น้ำหนัก ปริมาณน้ำคร่ำ ส่วนนำ การเจริญเติบโต ความผิดปกติ</text>
<text text-anchor="middle" x="564.5" y="-461.4" font-family="Sarabun" font-size="12.00">• เพาะเชื้อจากปัสสาวะ ช่องคลอด และทวารหนัก</text>
<text text-anchor="middle" x="564.5" y="-448.4" font-family="Sarabun" font-size="12.00">• ตรวจ CBC</text>
<text text-anchor="middle" x="564.5" y="-435.4" font-family="Sarabun" font-size="12.00">• fetal surveillance เช่น CTG กรณี GA ≥ 28 สัปดาห์</text>
</g>
