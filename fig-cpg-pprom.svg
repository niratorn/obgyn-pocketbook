<text text-anchor="middle" x="389" y="-233.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">GA 24&#45;33+6 สัปดาห์</text>
<text text-anchor="middle" x="389" y="-219.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• ประเมิน chorioamnionitis, labor, abruption เป็นระยะ</text>
<text text-anchor="middle" x="389" y="-205.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• ประเมิน fetal well&#45;being และ growth เป็นระยะ</text>
<text text-anchor="middle" x="389" y="-191.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• ให้ corticosteroids single course</text>
<text text-anchor="middle" x="389" y="-177.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• ให้ยาปฏิชีวนะยืดอายุครรภ์ (prolong latency)</text>
<text text-anchor="middle" x="389" y="-163.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• คลอดเมื่อพบ chorioamnionitis / NRFT / abruption / advanced labor</text>
<text text-anchor="middle" x="389" y="-149.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• คลอดเมื่อ GA 34 (หรือ 37) สัปดาห์</text>
<text text-anchor="middle" x="389" y="-135.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• คลอดก่อน 37 สัปดาห์ ให้ ATB ป้องกัน GBS</text>
<text text-anchor="middle" x="389" y="-121.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• GA 24&#45;32 สัปดาห์ ให้ MgSO4 neuroprotection</text>
</g>
