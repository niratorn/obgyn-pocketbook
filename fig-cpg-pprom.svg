<text text-anchor="middle" x="564.5" y="-224.4" font-family="Sarabun" font-size="12.00">GA 24&#45;33+6 สัปดาห์</text>
<text text-anchor="middle" x="564.5" y="-211.4" font-family="Sarabun" font-size="12.00">• ประเมิน chorioamnionitis, labor, abruption เป็นระยะ</text>
<text text-anchor="middle" x="564.5" y="-198.4" font-family="Sarabun" font-size="12.00">• ประเมิน fetal well&#45;being และ growth เป็นระยะ</text>
<text text-anchor="middle" x="564.5" y="-185.4" font-family="Sarabun" font-size="12.00">• ให้ corticosteroids single course</text>
<text text-anchor="middle" x="564.5" y="-172.4" font-family="Sarabun" font-size="12.00">• ให้ยาปฏิชีวนะยืดอายุครรภ์ (prolong latency)</text>
<text text-anchor="middle" x="564.5" y="-159.4" font-family="Sarabun" font-size="12.00">• คลอดเมื่อพบ chorioamnionitis / NRFT / abruption / advanced labor</text>
<text text-anchor="middle" x="564.5" y="-146.4" font-family="Sarabun" font-size="12.00">• คลอดเมื่อ GA 34 (หรือ 37) สัปดาห์</text>
<text text-anchor="middle" x="564.5" y="-133.4" font-family="Sarabun" font-size="12.00">• คลอดก่อน 37 สัปดาห์ ให้ ATB ป้องกัน GBS</text>
<text text-anchor="middle" x="564.5" y="-120.4" font-family="Sarabun" font-size="12.00">• GA 24&#45;32 สัปดาห์ ให้ MgSO4 neuroprotection</text>
</g>
