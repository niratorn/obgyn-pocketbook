<text text-anchor="start" x="14" y="-126.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">1.3 ครรภ์เดี่ยว / ครรภ์แฝด</text>
<text text-anchor="start" x="14" y="-112.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">1.4 การมีชีวิต + การเต้นหัวใจทารก</text>
