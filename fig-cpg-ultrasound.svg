<text text-anchor="start" x="14" y="-84.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">1.6 มดลูก/รังไข่ผิดปกติ เช่น Myoma, Ovarian cyst</text>
</g>
