<text text-anchor="middle" x="172.5" y="-471.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">Evaluation and Initial management (≤ 15 นาที)</text>
<text text-anchor="middle" x="172.5" y="-457.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• Uterine massage ประเมิน tone; ตามแพทย์ใช้ทุน</text>
<text text-anchor="middle" x="172.5" y="-443.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• Empty bladder / Foley cath</text>
<text text-anchor="middle" x="172.5" y="-429.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• NSS/RLS 1000 ml + Oxytocin 40 u IV 125 ml/hr</text>
<text text-anchor="middle" x="172.5" y="-415.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• หาสาเหตุ: atony / cervical tear / vaginal laceration / retained placenta</text>
<text text-anchor="middle" x="172.5" y="-401.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• เตรียม O2 mask with bag, PPH Box, ตาม Rescue team และสูติแพทย์</text>
</g>
