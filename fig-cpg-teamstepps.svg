<text text-anchor="middle" x="172.5" y="-534.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">Postpartum blood loss ≥ 250 ml → ALERT (เริ่มจับเวลา)</text>
