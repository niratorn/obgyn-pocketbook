<text text-anchor="middle" x="172.5" y="-338.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">Active bleed / Blood loss ≥ 500 ml &#45;&gt; ประกาศ PPH</text>
</g>
