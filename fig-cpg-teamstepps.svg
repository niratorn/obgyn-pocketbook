<!-- F -->
<g id="node5" class="node">
<title>F</title>
<path fill="#f6dfe0" stroke="#c07a86" d="M444,-281C444,-281 18,-281 18,-281 12,-281 6,-275 6,-269 6,-269 6,-147 6,-147 6,-141 12,-135 18,-135 18,-135 444,-135 444,-135 450,-135 456,-141 456,-147 456,-147 456,-269 456,-269 456,-275 450,-281 444,-281"/>
<text text-anchor="middle" x="231" y="-263.4" font-family="Sarabun" font-size="12.00">Further management (15&#45;45 นาที)</text>
<text text-anchor="middle" x="231" y="-250.4" font-family="Sarabun" font-size="12.00">• CALL FOR HELP (Rescue team + สูติแพทย์) [พว1]</text>
<text text-anchor="middle" x="231" y="-237.4" font-family="Sarabun" font-size="12.00">• O2 mask with bag 10 LPM [พว2]</text>
<text text-anchor="middle" x="231" y="-224.4" font-family="Sarabun" font-size="12.00">ใช้ PPH Box + Standing order:</text>
<text text-anchor="middle" x="231" y="-211.4" font-family="Sarabun" font-size="12.00">• เปิด IV เส้นที่สอง RLS 1000 ml free flow [พว3]</text>
<text text-anchor="middle" x="231" y="-198.4" font-family="Sarabun" font-size="12.00">• Transamine 1 g + NSS 100 ml IV drip in 15 min [พว2]</text>
<text text-anchor="middle" x="231" y="-185.4" font-family="Sarabun" font-size="12.00">• Methergine 0.2 mg (ไม่มี HT / ไม่ใช่ HIV) IV slow push</text>
<text text-anchor="middle" x="231" y="-172.4" font-family="Sarabun" font-size="12.00">• Blood: CBC, BUN, Cr, electrolyte, LFT, PT/PTT/INR [ประสาน LAB ด่วน]</text>
<text text-anchor="middle" x="231" y="-159.4" font-family="Sarabun" font-size="12.00">• G/M PRC 4 u, FFP 4 u, Platelet SDP 1 u [ประสานคลังเลือด]</text>
<text text-anchor="middle" x="231" y="-146.4" font-family="Sarabun" font-size="12.00">• พิจารณา 2nd line uterotonic / surgical [ประสานวิสัญญี / ห้องผ่าตัด / จอง ICU] [พว1]</text>
</g>
