<!-- CHK -->
<g id="node1" class="node">
<title>CHK</title>
<path fill="#f6f2e7" stroke="#c2b283" d="M396.5,-639C396.5,-639 65.5,-639 65.5,-639 59.5,-639 53.5,-633 53.5,-627 53.5,-627 53.5,-583 53.5,-583 53.5,-577 59.5,-571 65.5,-571 65.5,-571 396.5,-571 396.5,-571 402.5,-571 408.5,-577 408.5,-583 408.5,-583 408.5,-627 408.5,-627 408.5,-633 402.5,-639 396.5,-639"/>
<text text-anchor="middle" x="231" y="-621.4" font-family="Sarabun" font-size="12.00">หลังคลอด</text>
<text text-anchor="middle" x="231" y="-608.4" font-family="Sarabun" font-size="12.00">• Oxytocin 10 u IM</text>
<text text-anchor="middle" x="231" y="-595.4" font-family="Sarabun" font-size="12.00">• ใส่ถุงตวงเลือดทุกราย</text>
<text text-anchor="middle" x="231" y="-582.4" font-family="Sarabun" font-size="12.00">• รายเสี่ยงตกเลือด: เตรียม PPH Box / แจ้งสูติแพทย์ / T/S PRC 2 units</text>
</g>
