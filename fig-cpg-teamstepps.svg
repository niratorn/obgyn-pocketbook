<text text-anchor="middle" x="265.5" y="-80.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">TeamSTEPPS roles</text>
<text text-anchor="middle" x="265.5" y="-66.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• พว1 In charge: ให้ข้อมูลแพทย์ / แบ่งหน้าที่ / ประสานงาน</text>
<text text-anchor="middle" x="265.5" y="-52.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• พว2: Manage IV, V/S, I/O</text>
<text text-anchor="middle" x="265.5" y="-38.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• พว3: ช่วยเหลือแพทย์</text>
<text text-anchor="middle" x="265.5" y="-24.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• ผู้ช่วยพยาบาล: จัดเตรียมอุปกรณ์/เครื่องมือ</text>
<text text-anchor="middle" x="265.5" y="-10.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">หมายเหตุ: อาจสลับหน้าที่ พว2 และ พว3 ตามความเหมาะสม</text>
</g>
