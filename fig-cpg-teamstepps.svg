<path fill="#dfeaf6" stroke="#4f7ab0" d="M395.5,-540C395.5,-540 66.5,-540 66.5,-540 60.5,-540 54.5,-534 54.5,-528 54.5,-528 54.5,-516 54.5,-516 54.5,-510 60.5,-504 66.5,-504 66.5,-504 395.5,-504 395.5,-504 401.5,-504 407.5,-510 407.5,-516 407.5,-516 407.5,-528 407.5,-528 407.5,-534 401.5,-540 395.5,-540"/>
<text text-anchor="middle" x="231" y="-518.9" font-family="Sarabun" font-size="12.00">Postpartum blood loss ≥ 250 ml → ALERT (เริ่มจับเวลา)</text>
</g>
