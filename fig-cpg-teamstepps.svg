<path fill="#f6f2e7" stroke="#c2b283" d="M302.5,-657C302.5,-657 42.5,-657 42.5,-657 36.5,-657 30.5,-651 30.5,-645 30.5,-645 30.5,-599 30.5,-599 30.5,-593 36.5,-587 42.5,-587 42.5,-587 302.5,-587 302.5,-587 308.5,-587 314.5,-593 314.5,-599 314.5,-599 314.5,-645 314.5,-645 314.5,-651 308.5,-657 302.5,-657"/>
<text text-anchor="middle" x="172.5" y="-639.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">หลังคลอด</text>
<text text-anchor="middle" x="172.5" y="-625.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• Oxytocin 10 u IM</text>
<text text-anchor="middle" x="172.5" y="-611.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• ใส่ถุงตวงเลือดทุกราย</text>
<text text-anchor="middle" x="172.5" y="-597.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• รายเสี่ยงตกเลือด: เตรียม PPH Box / แจ้งสูติแพทย์ / T/S PRC 2 units</text>
</g>
