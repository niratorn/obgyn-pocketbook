<!-- F -->
<g id="node5" class="node">
<title>F</title>
<path fill="#f6dfe0" stroke="#c07a86" d="M333,-293C333,-293 12,-293 12,-293 6,-293 0,-287 0,-281 0,-281 0,-151 0,-151 0,-145 6,-139 12,-139 12,-139 333,-139 333,-139 339,-139 345,-145 345,-151 345,-151 345,-281 345,-281 345,-287 339,-293 333,-293"/>
<text text-anchor="middle" x="172.5" y="-275.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">Further management (15&#45;45 นาที)</text>
<text text-anchor="middle" x="172.5" y="-261.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• CALL FOR HELP (Rescue team + สูติแพทย์) [พว1]</text>
<text text-anchor="middle" x="172.5" y="-247.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• O2 mask with bag 10 LPM [พว2]</text>
<text text-anchor="middle" x="172.5" y="-233.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">ใช้ PPH Box + Standing order:</text>
<text text-anchor="middle" x="172.5" y="-219.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• เปิด IV เส้นที่สอง RLS 1000 ml free flow [พว3]</text>
<text text-anchor="middle" x="172.5" y="-205.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• Transamine 1 g + NSS 100 ml IV drip in 15 min [พว2]</text>
<text text-anchor="middle" x="172.5" y="-191.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• Methergine 0.2 mg (ไม่มี HT / ไม่ใช่ HIV) IV slow push</text>
<text text-anchor="middle" x="172.5" y="-177.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• Blood: CBC, BUN, Cr, electrolyte, LFT, PT/PTT/INR [ประสาน LAB ด่วน]</text>
<text text-anchor="middle" x="172.5" y="-163.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• G/M PRC 4 u, FFP 4 u, Platelet SDP 1 u [ประสานคลังเลือด]</text>
<text text-anchor="middle" x="172.5" y="-149.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• พิจารณา 2nd line uterotonic / surgical [ประสานวิสัญญี / ห้องผ่าตัด / จอง ICU] [พว1]</text>
</g>
