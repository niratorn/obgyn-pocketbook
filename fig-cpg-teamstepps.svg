<!-- E -->
<g id="node3" class="node">
<title>E</title>
<path fill="#fbf4d9" stroke="#d9b96a" d="M450,-473C450,-473 12,-473 12,-473 6,-473 0,-467 0,-461 0,-461 0,-391 0,-391 0,-385 6,-379 12,-379 12,-379 450,-379 450,-379 456,-379 462,-385 462,-391 462,-391 462,-461 462,-461 462,-467 456,-473 450,-473"/>
<text text-anchor="middle" x="231" y="-455.4" font-family="Sarabun" font-size="12.00">Evaluation and Initial management (≤ 15 นาที)</text>
<text text-anchor="middle" x="231" y="-442.4" font-family="Sarabun" font-size="12.00">• Uterine massage ประเมิน tone; ตามแพทย์ใช้ทุน</text>
<text text-anchor="middle" x="231" y="-429.4" font-family="Sarabun" font-size="12.00">• Empty bladder / Foley cath</text>
<text text-anchor="middle" x="231" y="-416.4" font-family="Sarabun" font-size="12.00">• NSS/RLS 1000 ml + Oxytocin 40 u IV 125 ml/hr</text>
<text text-anchor="middle" x="231" y="-403.4" font-family="Sarabun" font-size="12.00">• หาสาเหตุ: atony / cervical tear / vaginal laceration / retained placenta</text>
<text text-anchor="middle" x="231" y="-390.4" font-family="Sarabun" font-size="12.00">• เตรียม O2 mask with bag, PPH Box, ตาม Rescue team และสูติแพทย์</text>
</g>
<!-- P1&#45;&gt;E -->
<g id="edge2" class="edge">
<title>P1&#45;&gt;E</title>
