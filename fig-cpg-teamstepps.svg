<path fill="#e6f1fb" stroke="#7d9bc0" d="M487,-94C487,-94 215,-94 215,-94 209,-94 203,-88 203,-82 203,-82 203,-12 203,-12 203,-6 209,0 215,0 215,0 487,0 487,0 493,0 499,-6 499,-12 499,-12 499,-82 499,-82 499,-88 493,-94 487,-94"/>
<text text-anchor="middle" x="351" y="-76.4" font-family="Sarabun" font-size="12.00">TeamSTEPPS roles</text>
<text text-anchor="middle" x="351" y="-63.4" font-family="Sarabun" font-size="12.00">• พว1 In charge: ให้ข้อมูลแพทย์ / แบ่งหน้าที่ / ประสานงาน</text>
<text text-anchor="middle" x="351" y="-50.4" font-family="Sarabun" font-size="12.00">• พว2: Manage IV, V/S, I/O</text>
<text text-anchor="middle" x="351" y="-37.4" font-family="Sarabun" font-size="12.00">• พว3: ช่วยเหลือแพทย์</text>
<text text-anchor="middle" x="351" y="-24.4" font-family="Sarabun" font-size="12.00">• ผู้ช่วยพยาบาล: จัดเตรียมอุปกรณ์/เครื่องมือ</text>
<text text-anchor="middle" x="351" y="-11.4" font-family="Sarabun" font-size="12.00">หมายเหตุ: อาจสลับหน้าที่ พว2 และ พว3 ตามความเหมาะสม</text>
</g>
