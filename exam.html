<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACK OBGYN EXAM (NL2 2009-2024) - รวมข้อสอบ + เฉลย + คำอธิบาย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#12426E; --blue2:#1d5a94; --ink:#1e2733; --muted:#5b6b7c;
    --line:#e2e8f0; --bg:#f4f6f9; --card:#ffffff;
    --ok:#0f7a4d; --okbg:#e7f6ee; --chip:#eef2f7; --warn:#8a5a00; --warnbg:#fff4dd;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Sarabun', Tahoma, 'Segoe UI', sans-serif;
    font-size:16px; line-height:1.6;
  }
  header{ background:linear-gradient(135deg,var(--blue),var(--blue2)); color:#fff; padding:18px 16px 14px; }
  header .wrap{max-width:900px; margin:0 auto;}
  header h1{margin:0 0 3px; font-size:clamp(19px,4.4vw,26px); font-weight:700; letter-spacing:.2px;}
  header .sub{opacity:.92; font-size:13.5px;}
  .controls{ position:sticky; top:0; z-index:20; background:rgba(255,255,255,.97); backdrop-filter:blur(6px); border-bottom:1px solid var(--line); padding:10px 16px; }
  .controls .wrap{max-width:900px; margin:0 auto; display:flex; flex-direction:column; gap:9px;}
  .searchrow{display:flex; gap:8px; align-items:center;}
  #search{ flex:1; padding:9px 12px; border:1.5px solid var(--line); border-radius:9px; font-family:inherit; font-size:15px; outline:none; }
  #search:focus{border-color:var(--blue2);}
  .count{font-size:13px; color:var(--muted); white-space:nowrap;}
  .yearlabel{font-size:12.5px; color:var(--muted); margin-right:2px;}
  .chips{display:flex; flex-wrap:wrap; gap:6px; align-items:center;}
  .chip{ border:1.5px solid var(--line); background:var(--chip); color:var(--ink); padding:4px 10px; border-radius:999px; font-size:13px; cursor:pointer; user-select:none; font-family:inherit; transition:.12s; }
  .chip:hover{border-color:var(--blue2);}
  .chip.active{background:var(--blue); color:#fff; border-color:var(--blue);}
  main{max-width:900px; margin:0 auto; padding:14px 16px 96px;}
  .hint{font-size:13px; color:var(--muted); background:#eef4fb; border:1px solid #d7e5f4; border-radius:9px; padding:8px 12px; margin:0 0 14px;}
  .hint b{color:var(--blue);}
  .card{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:15px 16px; margin:0 0 14px; box-shadow:0 1px 2px rgba(16,40,70,.04); }
  .qhead{display:flex; align-items:center; gap:9px; flex-wrap:wrap; margin-bottom:8px;}
  .qno{ background:var(--blue); color:#fff; font-weight:700; font-size:14px; padding:2px 10px; border-radius:8px; white-space:nowrap; }
  .yr{font-size:11.5px; color:var(--blue); background:#eaf1f8; border:1px solid #d5e3f1; padding:1px 8px; border-radius:999px;}
  .dup{font-size:11.5px; color:var(--warn); background:var(--warnbg); border:1px solid #f0dca8; padding:1px 8px; border-radius:999px;}
  .stem{font-weight:600; margin:2px 0 10px; white-space:pre-wrap;}
  .choices{list-style:none; margin:0 0 10px; padding:0; display:grid; grid-template-columns:1fr 1fr; gap:5px 14px;}
  .choices li{ padding:5px 9px; border:1px solid var(--line); border-radius:8px; font-size:15px; background:#fbfcfe; }
  .choices li .lt{font-weight:700; margin-right:4px;}
  /* correct-choice styling only shows in reveal mode */
  body.reveal-on .choices li.correct{background:var(--okbg); border-color:#bfe6cf; color:var(--ok); font-weight:600;}
  body.reveal-on .choices li.correct .lt::after{content:" \2713";}
  /* answer + explanation hidden by default (think-first mode) */
  .answer-block{display:none;}
  body.reveal-on .answer-block{display:block;}
  .ans{font-size:14.5px; margin:2px 0 9px;}
  .ans b{color:var(--ok);}
  .ans.none b{color:var(--warn);}
  .expl{ background:#f7f9fc; border-left:4px solid var(--blue2); border-radius:0 8px 8px 0; padding:9px 12px; font-size:15px; white-space:pre-wrap; color:#243342; }
  .expl .lb{font-weight:700; color:var(--blue); }
  .fig{margin-top:8px; font-size:13px; color:var(--muted); background:#f0f3f7; border:1px dashed #c9d5e2; border-radius:8px; padding:6px 10px;}
  .fig b{color:var(--blue);}
  .empty{text-align:center; color:var(--muted); padding:50px 10px;}
  #top{ position:fixed; right:16px; bottom:18px; z-index:30; background:var(--blue); color:#fff; border:none; cursor:pointer; width:46px; height:46px; border-radius:50%; font-size:20px; box-shadow:0 3px 10px rgba(16,40,70,.3); display:none; }
  /* lower-left reveal switch */
  .switch{ position:fixed; left:16px; bottom:18px; z-index:31; display:flex; align-items:center; gap:9px; background:#fff; border:1.5px solid var(--line); border-radius:999px; padding:7px 14px 7px 7px; cursor:pointer; box-shadow:0 3px 12px rgba(16,40,70,.20); font-family:inherit; font-size:13.5px; color:var(--ink); }
  .switch .track{width:40px; height:23px; border-radius:999px; background:#c2ccd7; position:relative; transition:.15s; flex:none;}
  .switch .knob{position:absolute; top:2px; left:2px; width:19px; height:19px; border-radius:50%; background:#fff; transition:.15s; box-shadow:0 1px 3px rgba(0,0,0,.3);}
  body.reveal-on .switch .track{background:var(--ok);}
  body.reveal-on .switch .knob{left:18px;}
  .switch-lbl{font-weight:700; white-space:nowrap;}
  .switch-lbl small{display:block; font-weight:400; font-size:10.5px; color:var(--muted); line-height:1;}
  @media (max-width:560px){
    .choices{grid-template-columns:1fr;}
    body{font-size:15.5px;}
    .switch-lbl small{display:none;}
  }
</style>
</head>

<header>
  <div class="wrap">

  </div>
</header>

<div class="controls">

  <span class="track"><span class="knob"></span></span>

</button>

วน / ขอพรสิ่งศักดิ์สิทธิ์; pig cartoon", "dup": ""}, {"no": "73", "seq": 73, "years": ["2022"], "stem": "A 35-year-old pregnant women, GA 38 weeks presents with labor pain and spontaneous membrane rupture. Her electronic fetal monitoring shows repeated variable deceleration FHR with baseline of 120-130 bpm, interval of 2-3 minutes, contraction last 50 seconds, moderate intensity. What is the proper management? (2022)", "choices": {"A": "Pelvic examination", "B": "Lying in left lateral decubitus position", "C": "Cesarean delivery", "D": "Amnioinfusion"}, "answer": "A) Pelvic examination > D) Amnioinfusion", "expl": "จากโจทย์ให้ Keywords ว่ามี Repeated variable deceleration + น้ำเดิน จึงนึกถึงภาวะ Prolapse cord / Cord compression เนื่องมาจากน้ำน้อย เพราะฉะนั้นอาจตอบ (ไม่รู้โจทย์จริงมี clues มากกว่านี้มั้ย ต้องลองเดาใจคนออกนิดนึง) / Pelvic examination : เพื่อประเมินว่ามี Cord prolapse หรือไม่ / Amnioinfusion : สามารถช่วยในกรณีที่มี Cord compression จาก น้ำน้อย แต่คือชีวิตจริงไม่เห็นใครทำ / นอนตะแคง : อาจช่วยในกรณีที่เป็น uteroplacental insufficiency แต่ไม่ได้เช็คปัญหาเรื่อง cord compression โดยตรง", "fig": true, "figNote": "TABLE 24-3. Some Resuscitative Measures for Category II or Category III Tracings (Fetal Heart Rate Abnormality vs Interventions)", "dup": ""}, {"no": "74", "seq": 74, "years": ["2022"], "stem": "A 30 years old couple come to the clinic for prenatal screening. Maternal laboratory shows Hct 39%, Hb 13 mg/dl, Hb typing A 75% A2 3 % E 22%. Paternal laboratory shows Hct 36%, Hb 12 mg/dl, Hb typing A75% E25%. Which condition can be found in this couple's child? (2022)", "choices": {"A": "Bart's hydrops", "B": "HbH/HbE disease", "C": "Homozygous Hb E thalassemia", "D": "Beta thalassemia/HbE disease", "E": "Beta thalassemia disease"}, "answer": "C) Homozygous Hb E thalassemia", "expl": "จากโจทย์พบว่าแม่เป็น Hb E trait cannot rule out alpha thal-1 trait ส่วนพ่อเป็น Hb E trait ที่ไม่มี alpha thal-1 trait ดังนั้นเวลาผสมก็นออกมาจึงมีโอกาสเป็นได้มากสุดคือ Homozygous Hb E thalassemia 25%", "fig": true, "figNote": "pig cartoon in corner", "dup": ""}, {"no": "75", "seq": 75, "years": ["2022"], "stem": "A primigravida woman with gestational age of 38 weeks comes to the clinic with clear fluid leakage for 2 hours. Physical examination is unremarkable. Fetal heart rate is 140 bpm. Pelvic examination shows cervical dilatation of 3 cm, 80% effacement, -1 station, vertex presentation. She has uterine contraction of 8 minutes interval, 30 seconds duration, ... Intensity. After 4 hours, her contraction becomes 6 minutes interval, 35 seconds duration. Her pelvic examination then is 4 cm cervical dilatation, 100% effacement, -1 station. What is the appropriate management? (2022)", "choices": {"A": "Observe labor progression", "B": "Evaluate fetal weight by ultrasound", "C": "Continuous EFM", "D": "Ultrasound", "E": "Emergency Cesarean delivery"}, "answer": "A) Observe labor progression", "expl": "จากโจทย์คือ term with in labor แต่ดูกึ้งกึ่ง latent phase ? active phase ? (แล้วแต่น้องจะใช้ reference ไหนน่ะสิ 3, 4, 5, 6 cm = active phase ? ได้หมด) ดังนั้นลองมาตอบแบบตัด choice ดู / Emergency C/S : ตัดไปก่อนเลย contraction interval ยังไม่ดีเลย แปลว่า power ยังไม่ดี ไม่ควรตัดสิน C/S ตั้งแต่ ตอนนี้ ควรไปปรับ power ก่อน / Continuous EFM : ไม่ได้ดูมีอะไรอันตรายถึงกับต้อง continuous monitor เลย ใช้ฟังเป็นครั้งคราวได้ / Ultrasound / Evaluate fetal weight by US : ถ้าจะทำคงทำเพื่อประเมินน้ำหนักลูก (Passenger) ว่า underestimate ไปหรือไม่ แต่มันก็ไม่ค่อยแม่นเท่าไหร่อยู่ดี +/- 15% / Observe progression of labor : ถ้าคิดว่าช่วง 3 à 4 cm ยังเป็น latent phase แนะนำให้ observe ยังไม่ต้องทำอะไร ถึงว่าเป็น normal progression ได้ แต่ถ้าคิดว่า 3 cm เอาเข้า active phase แล้ว แบบนี้น้องควรไปปรับ power ให้ดีก่อน (ก็ควรจะมี choice oxytocin เพิ่มมา)", "fig": false, "figNote": "", "dup": ""}, {"no": "76", "seq": 76, "years": ["2022"], "stem": "A 46-year-old woman presents with hot flushes, night sweat, and insomnia for 2 months. She underwent total abdominal hysterectomy 5 years ago due to myoma uteri. What is the most proper investigation ? (2022)", "choices": {"A": "LH", "B": "FSH", "C": "Estrogen", "D": "Prolactin", "E": "GnRH"}, "answer": "B) FSH", "expl": "จากโจทย์ผู้ป่วยเริ่มมี Vasomotor symptoms ดังนั้นจึงควรเจาะ hormone FSH เพื่อ confirm ว่าเข้า criteria menopause หรือยัง (> 25 mIU/mL)", "fig": false, "figNote": "", "dup": ""}, {"no": "77", "seq": 77, "years": ["2022"], "stem": "A 38-year-old woman G3P2 GA 12 weeks comes for first ANC (U/D hypertension). She takes enalapril for 3 years. She stops drug after pregnancy. This physical examination reveals BP 150/80 mmHg (others are normal). What is the most appropriate management? (2022)", "choices": {"A": "Represcribe enalapril", "B": "Prescribe atenolol", "C": "Prescribe losartan", "D": "Prescribe methyldopa", "E": "Home BP monitoring"}, "answer": "E) Home BP monitoring", "expl": "สำหรับ Chronic hypertension คุณ William ได้กล่าวไว้ว่าเราจะให้ยาความดันต่อเมื่อมี Persistent SBP >150 mmHg หรือ DBP >95-100 mmHg ดังนั้นสำหรับผู้ป่วยรายนี้ดีคว่ารอดูผล home BP monitoring ก่อนได้ (ไม่ควรให้ enalapril / losartan เพราะมันเป็น teratogen ใครกากควรตัดคะแนน!!)", "fig": true, "figNote": "Textbook excerpt about antihypertensive treatment thresholds (August 2015; Webster 2017); cartoon heart with blood pressure cuff", "dup": ""}, {"no": "78", "seq": 78, "years": ["2022"], "stem": "A pregnant woman with gestational age of 39 weeks comes to the clinic with labor pain. Pelvic examination shows cervical dilatation of 3 cm, 100% effacement, O station, vertex presentation. After 2 hours, her pelvic examination becomes 7 cm cervical dilatation. Good FHR, good uterine contraction. What is the appropriate management? (2022)", "choices": {"A": "Cesarean delivery", "B": "Oxytocin augmentation", "C": "PGE1", "D": "xx"}, "answer": "....????....", "expl": "จากโจทย์พบว่า cervical dilation เพิ่มจาก 3 —> 7 ภายใน 2 ชั่วโมง (normal progression of labor), good uterine contraction ดังนั้นไม่ต้องให้อะไรมาเพิ่มแล้ว ขอตอบ observe พอ 555555", "fig": false, "figNote": "", "dup": ""}, {"no": "79", "seq": 79, "years": ["2022"], "stem": "A pregnant woman GA 12 weeks comes for routine ANC. Fundal height measured GA 16 weeks. Ultrasound findings : uterus — multiple cystic structures, ovary — bilateral anechoic multiloculated cysts. What is the identity of the ovarian cysts? (2022)", "choices": {"A": "Serous adenoma", "B": "Corpus luteal cyst", "C": "Theca lutein cyst", "D": "Mucous cyst", "E": "Dermoid cyst"}, "answer": "C) Theca lutein cyst", "expl": "ดูลักษณะของ ovarian cyst แล้วกาได้เลยจ้า อีกเหตุผลสนับสนุนคือ Theca lutein เป็น cyst ที่สามารถพบได้ในภาวะ high hCG level ดังนั้นพวก Molar pregnancy ก็อาจพบ cyst ชนิดนี้ได้เช่นกัน / Corpus luteal cyst : Anechoic / hypoechoic cyst, diffusely thick wall, peripheral vascularity, size 2-10 cm ,possible crenulated contour และต้องพบในช่วง luteal phase ของรอบเดือน / Dermoid cyst : Complex, containing both solid and cystic components (Echogenic areas (like fat) with acoustic shadowing, cystic areas (fluid-filled), and sometimes calcifications) / Theca lutein cyst : Usually bilateral enlarged, multicystic ovaries, thin walled and clear contents / Serous cystadenoma : Simple, unilocular or multilocular, clear watery content, thin-walled with smooth margins / Mucinous cystadenoma : Multilocular cyst with thicker walls, multiple internal septation, +/- solid components", "fig": true, "figNote": "Five ultrasound/gross images labeled Corpus luteal cyst, Mucinous Cyst, Theca lutein cyst, Serous cyst, Dermoid cyst", "dup": ""}, {"no": "80", "seq": 80, "years": ["2022"], "stem": "A 30 years old pregnant woman, G1 GA 23 wk, came for routine ANC visit. She felt quickening 4 weeks ago, others are unremarkable. PE : Fundal height 23 cm from pubic symphysis, no detectable fetal movement & heart sound. What is the most appropriate management ? (2022)", "choices": {"A": "Reassurance", "B": "Fetal movement counting", "C": "Vibroacoustic stimulation", "D": "Transabdominal ultrasound", "E": "1 week appointment at ANC clinic"}, "answer": "D) Transabdominal ultrasound", "expl": "จากโจทย์มาฝากครรภ์ตรวจร่างกายแล้วหา heart sound ไม่เจอ ดังนั้นก่อนอื่นจึงควร confirm viability ของทารกก่อน ด้วย TAS", "fig": false, "figNote": "", "dup": ""}, {"no": "81", "seq": 81, "years": ["2023"], "stem": "A 37-week pregnant female with no ANC history visit the hospital due to labor pain. Physical examination: fundal height 3/4 above umbilicus. Pelvic examination: fully dilated cervix, effacement 100%, station O. EFM is shown below. What is the most appropriate management ? (2023)", "choices": {"A": "Observe labor progression", "B": "Vacuum extraction", "C": "Forceps extraction", "D": "IV oxytocin", "E": "Emergency C/S"}, "answer": "A) Observe labor progression", "expl": "จากโจทย์บอกว่าเป็น term pregnancy with in labor fully dilate, EFM cat I และไม่มีปัญหาอื่นๆ ดังนั้นจึงควรให้คลอดได้ตามปกติ ไม่ต้องทำอะไรเพิ่มเติม", "fig": true, "figNote": "EFM (electronic fetal monitoring) tracing strip showing FHR ~120-140 and uterine contractions", "dup": ""}, {"no": "82", "seq": 82, "years": ["2023"], "stem": "A pregnant woman, G2P1 GA 39 weeks, presents with labor pain. She has no underlying disease or current obstetric complications. EFW uterine contraction interval 2-3 min, duration 50 secs. PV : Cervical dilation 8 cm, effacement 100%, station +1. What is the most proper management ? (2023)", "choices": {"A": "IV oxytocin", "B": "Observe labor progression for 1 hr", "C": "NST", "D": "Sedation", "E": "Intrauterine resuscitation"}, "answer": "A) Observe labor progression", "expl": "จากโจทย์บอกว่าเป็น term pregnancy with active phase of labor, good uterine contraction และไม่มีปัญหาอื่นๆ ดังนั้นจึงควรให้รอคลอดได้ตามปกติ ยังไม่ต้องทำอะไรเพิ่มเติม", "fig": false, "figNote": "", "dup": ""}, {"no": "83", "seq": 83, "years": ["2023"], "stem": "A 30-year-old pregnant woman, no ANC presented with labor pain. Fundal height 3/4 above umbilicus. Uterine contracti  years old female has severe dysmenorrhea. She is infertile and has married for 5 years. PV: tender at adnexal with cystic lesion. What is the most proper management? (2020)", "choices": {"A": "DMPA", "B": "OCPs", "C": "ยากระตุ้นการตกไข่", "D": "EL diagnosis"}, "answer": "C) ยากระตุ้นการตกไข่", "expl": "จากโจทย์ผู้ป่วยมีอาการ Severe dysmenorrhea + Infertility + Cystic lesion at adnexa จึงนึกถึงภาวะ Endometriosis ดังนั้นจึงแนะนำว่าถ้าอยากมีบุตร ควรไปปั๊ดการ Cyst ก่อนโดยวิธี Laparoscopic with diagnosis with ovarian cystectomy จากนั้นค่อยมาเข้ากระบวนการรักษาภาวะมีบุตรยากต่อ (ถ้าข้อนี้มี choice laparo ก็ควรตอบเลย)", "fig": true, "figNote": "Flowchart/algorithm for management of Stage I/II and Stage III/IV endometriosis by age (<35, >35) and pain/no pain, with branches to Laparoscopy, Expectant mngt, Ovarian stim/IUI, IVF, Endometrioma >4 cm.", "dup": ""}, {"no": "188", "seq": 188, "years": ["2020"], "stem": "A 25 years old female, nulliparous, has progressive dysmenorrhea which cannot control with any pain killer. She plans to have a baby next year. PV: normal vagina, brown spot on cervix, nodularity on uterosacral ligament, retroverted uterus, no adnexal mass. What is the next management in this patient? (2020)", "choices": {"A": "Danazol", "B": "Combined pill", "C": "GnRH agonist", "D": "Levonorgestrel uterine device", "E": "DMPA"}, "answer": "B) Combined pill", "expl": "จากโจทย์พบว่าเป็น Secondary dysmenorrhea ซึ่งน่าจะเกิดจากภาวะ Endometriosis เนื่องจากตรวจร่างกายแล้วมี Brown spot on cervix, nodularity on uterosacral ligament, retroverted uterus ดังนั้นการรักษาที่ควรให้คือ COCs, Progestogens, GnRH agonist ก็ได้ทั้งหมด แต่.... / ผู้ป่วยอายุ 25 ปี และ GnRH agonist ควรใช้แค่ในช่วงสั้นๆ ไม่เกิน 6 เดือน ไม่นั้นจะทำให้เกิดปัญหา bone loss จึงไม่ควรตอบ / ผู้ป่วยต้องการมีลูกปีหน้า ดังนั้นไม่ควรเลือก LNG-IUD เนื่องจากมันคุมกำเนิดได้นาน 5 ปี / ผู้ป่วยต้องการมีลูกปีหน้า ดังนั้นไม่ควรเลือก DMPA เนื่องจากหลังจากหยุดยาต้องใช้เวลาพักนึงกว่าจะกลับมามีลูกได้ / ข้อนี้ตอบ Combined pill เหมาะสมที่สุด", "fig": false, "figNote": "", "dup": ""}, {"no": "189", "seq": 189, "years": [], "stem": "A 14 years old female presented with hypermenorrhea. Her last LMP was 3 weeks ago but she is still bleeding and using 1 pad/days. She had no history of sexual activity and her first menstruation was 13 years old. What is proper management?", "choices": {"A": "NSAIDs", "B": "Tranexamic acid", "C": "DMPA", "D": "OCP", "E": "High dose estrogen"}, "answer": "D) OCP", "expl": "จากโจทย์พบว่ามี AUB แบบ heavy menstrual bleeding ในช่วงอายุ adolescent ซึ่งส่วนมากเกิดจาก Immature HPO axis ดังนั้นแนวทางการรักษาคือ / Mild bleeding (Hb normal) : Iron supplement, Low-dose OCP or Cyclic progestin / Moderate bleeding : COCs, oral progestin / Emergency : Admit, consider for blood transfusion, prefer medical > surgical intervention", "fig": false, "figNote": "", "dup": ""}, {"no": "190", "seq": 190, "years": ["2020"], "stem": "ผู้ป่วยหญิงอายุ 18 ปี มีประจำเดือนมา 3 สัปดาห์ ปัจจุบันยังมีอยู่ ไม่มีอาการปวดประจำเดือน ไม่ชัด ปกติประจำเดือนมาทุก 2 เดือน มารอบละ 2 สัปดาห์ จงให้การรักษาในผู้ป่วยรายนี้ ? (2020)", "choices": {"A": "combined oral pill", "B": "DMPA", "C": "Tranexamic acid", "D": "Endometrial sampling"}, "answer": "A) combined oral pill", "expl": "จากโจทย์พบว่ามี AUB แบบ heavy menstrual bleeding โดยประจำเดือนของผู้ป่วยไม่ได้มาทุกรอบเดือน เพราะบอกว่า interval 2 month ดังนั้นควร control cycle ให้ปกติด้วยการใช้ Combined oral pill / Cyclic Progestin", "fig": false, "figNote": "", "dup": ""}, {"no": "191", "seq": 191, "years": ["2021"], "stem": "A 30-year-old patient complained of amenorrhea after an abortion. She underwent dilation and curettage. What is the most proper investigation? (2021)", "choices": {"A": "FSH and E2 level", "B": "TSH and PRL level", "C": "Pelvic ultrasound", "D": "SIS", "E": "Hysteroscopy"}, "answer": "E) Hysteroscopy", "expl": "ผู้ป่วยที่เกิดภาวะ Amenorrhea ตามหลังจากการ Curettage เราควรจะนึกถึงว่าเกิดจากพังผืดในโพรงมดลูก หรือ Asherman syndrome มากที่สุด ดังนั้นจึงควรทำ Hysteroscopy เข้าไปส่องเพื่อวินิจฉัยและตัดพังผืดเพื่อรักษาไปพร้อมๆกัน", "fig": false, "figNote": "", "dup": ""}, {"no": "192", "seq": 192, "years": ["2021"], "stem": "A 52-year-old female u/d : DM, para 2, present with vaginal spotting for 1 mo. No pelvic pain PE: BW 70, H 150, V/S 140/90 mmHg, No pale conjunctiva PV : MIUB -> normal VG -> atrophic mucosa, blood Os -> close, minimal bloody d/c per os Ut -> normal size Adnexa -> no mass, not tender Most proper investigation ? (2021)", "choices": {"A": "Pap smear", "B": "F&C", "C": "CA 125", "D": "TVS", "E": "FSH, E2"}, "answer": "B) F&C", "expl": "จากโจทย์ผู้ป่วยมีภาวะ Postmenopausal / Perimenopausal bleeding ร่วมกับมี U/D DM, Obesity ดังนั้นจึงมีความเสี่ยง Endometrial cancer จึงควรได้รับการ evaluate endometrial tissue จึงตอบ F&C", "fig": false, "figNote": "", "dup": ""}, {"no": "193", "seq": 193, "years": ["2021"], "stem": "A 29 year old woman presented with galactorrhea and absent menstruation for several months BP 141/90 PR 50 No cushingoid appearance no acromegaly Pituitary MRI show mass 1cm at gland with no chiasmatic invasion. Diagnosis ? (2021)", "choices": {"A": "Prolactinoma", "B": "Schwannoma", "C": "Craniopharyngioma", "D": "Sheehan syndrome"}, "answer": "A) Prolactinoma", "expl": "จากโจทย์ Keyword คือ Secondary amenorrhea + Galactorrhea จากอาการที่บอกมาหลายๆอย่าง แปลว่าน่าจะเป็นก้อนที่ยังไม่มี mass effect เพราะยังไม่มีปัญหาเกี่ยวกับ growth hormone, ACTH ดังนั้นไม่น่าจะใช่ภาวะ hyperprolactinemia จาก mass effect เช่น Craniopharyngioma แต่น่าจะมาจาก Prolactinoma โดยตรง", "fig": false, "figNote": "", "dup": ""}, {"no": "194", "seq": 194, "years": ["2022"], "stem": "A teen girl presents with a menstruation problem. Her menstruation lasts 7 days, with interval of 20 days. She uses tampon 4 pads per day during the period. Her peripheral blood smear is depicted [suspected iron deficiency anemia picture]. Her hemoglobin is 7 g/dl, MCV 65 fl. Which supplement should be prescribed for this patient? (2022)", "choices": {"A": "Iron supplement", "B": "Folic supplement", "C": "Hb typing", "D": "xx"}, "answer": "A) Iron supplement", "expl": "จากโจทย์พบว่าผู้ป่วยมี Heavy menstrual bleeding with anemia ในช่วง adolescent จึงเข้ากับภาวะ Iron deficiency anemia มากที่สุด จึงตอบ Iron supplement (ถึงไม่ให้รูปภาพมาก็น่าจะต้องตอบได้นะ)", "fig": true, "figNote": "Stem references a peripheral blood smear picture (suspected iron deficiency anemia); no image shown on the page, only text placeholder in brackets.", "dup": ""}, {"no": "195", "seq": 195, "years": ["2022", "2024"], "stem": "34.) A 25-year-old female complains of cyclic dysmenorrhea and painful intercourse. PE: normal uterus, left cystic mass 6 cm in diameter, not tender, tender nodule at uterosacral ligament. What is most likely diagnosis? (2022, 2024)", "choices": {"A": "Dermoid cyst", "B": "Endometrioma", "C": "Theca luteal cyst", "D": "Tubo-ovarian abscess", "E": "Functional ovarian cyst"}, "answer": "B) Endometrioma", "expl": "จากโจทย์ Keyword คือมีประวัติ Dysmenorrhea + Dyspareunia ซึ่งเข้าได้กับภาวะ Endometriosis ดังนั้น cyst ที่เจอ น่าจะเข้าได้กับ Endometrioma มากที่สุด", "fig": false, "figNote": "", "dup": ""}, {"no": "196", "seq": 196, "years": ["2022"], "stem": "A 40-year-old woman presents with abnormal uterine bleeding. She has her last menstruation 15 days ago. She denies any herbal use. What is the next appropriate management? (2022)", "choices": {"A": "Transvaginal ultrasonography", "B": "Endometrial sampling", "C": "Uterine pregnancy test", "D": "xx"}, "answer": "A) Transvaginal ultrasonography > C) Urine pregnancy test", "expl": "จากโจทย์ผู้ป่วยมีเลือดออกผิดปกติแบบ Intermenstrual bleeding ดังนั้นที่ควรทำ คือ / UPT : ประเมินว่าเป็น pregnancy complication หรือไม่ / TVS : ประเมินว่ามี structural cause ใดๆ ที่ทำให้เกิด AUB / คิดว่าควรต้องดูโจทย์อีกทีว่าให้เพิ่มเติมเรื่องประวัติ SI มั้ย เท่าที่รีวิวข้อสอบน้องๆมาส่วนใหญ่ ถ้าจะให้เป็น AUB จาก pregnancy complication มักจะเขียนชัดเจนว่า LMP 6,8,10 wk คือเกินเดือนหมด แต่ตรงนี้ LMP 15 days ago เลยคิดว่าน่าจะอยากถามพวก AUB จาก gyne cause มากกว่า (คิดเอาเอง) จึงควรประเมิน TVS (แต่ชีวิตจริงก็ควรทำทั้ง 2 อย่าง)", "fig": false, "figNote": "", "dup": ""}, {"no": "197", "seq": 197, "years": ["2023"], "stem": "35.) A woman presents with galactorrhea and amenorrhea. She delivered first child 10 years ago. What is investigation for diagnosis ? (2023)", "choices": {"A": "FSH", "B": "Prolactin", "C": "Estrogen", "D": "Thyroid function test"}, "answer": "B) Prolactin", "expl": "จากโจทย์ Keyword ในข้อนี้คือ galactorrhea จึงชวนสงสัย hyperprolactinemia มากที่สุด จึงตอบ prolactin", "fig": false, "figNote": "", "dup": ""}, {"no": "198", "seq": 198, "years": ["2023"], "stem": "A 49 years obese woman presented with 3 months history of continuous scanty vaginal bleeding, no hormonal replacement therapy. PV : normal. PAP smear : NILM. What is the most appropriate management ? (2023)", "choices": {"A": "Serum FSH, Estriol", "B": "Oral cyclic progestin", "C": "TVS", "D": "Endometrial sampling", "E": "Hysterectomy"}, "answer": "D) Endometrial sampling", "expl": "จากโจทย์ผู้ป่วยมีภาวะ Perimenopausal bleeding ร่วมกับมี U/D Obesity ดังนั้นจึงมีความเสี่ยง Endometrial cancer จึงควรได้รับการ evaluate endometrial tissue จึงตอบ Endometrial biopsy (TVS ก็คงต้องทำในผู้ป่วยรายนี้ แต่ว่าสุดท้ายแล้วควรได้ tissue diagnosis อยู่ดี เพราะความเสี่ยงเยอะ)", "fig": false, "figNote": "", "dup": ""}, {"no": "199", "seq": 199, "years": ["2024"], "stem": "A 28-year-old woman presents with amenorrhea for 3 months. She has a history of irregular menstruation and a BMI of 28. On physical examination, the pelvic examination reveals a normal-sized, non-tender uterus with no adnexal masses and no cervical motion tenderness. The urine pregnancy test is negative. What is the most appropriate investigation ? (2024)", "choices": {"A": "Transvaginal ultrasound (TVS)", "B": "Serum HCG", "C": "Serum estradiol", "D": "Progesterone challenge test", "E": "Serum FSH"}, "answer": "E) Serum  "Severe preeclampsia", "C": "Essential HT", "D": "...... with nephrotic syndrome"}, "answer": "....????....", "expl": "จากโจทย์พบว่ามี Severe range HT + proteinuria แต่ว่าไม่ได้บอก GA มาจึงตอบไม่ได้ / ถ้า GA < 20 wk อ่ะ แบบนี้ควรตอบ Chronic HT (Essential HT) / ถ้า GA > 20 wk อ่ะ แบบนี้ควรตอบ Preeclampsia with severe features", "fig": false, "figNote": "", "dup": ""}, {"no": "263", "seq": 263, "years": ["2017", "2019"], "stem": "19 years old female presented at the emergency department with mild abdominal pain and minimal bleeding per vagina for 2 days. Her LMP was 2 month ago. PV: cervical os 1 finger tip, uterus 8 weeks size, no adnexal mass. What is the most likely diagnosis? (2017, 2019)", "choices": {"A": "Embryonic demised", "B": "Threatened abortion", "C": "Inevitable abortion", "D": "Incomplete abortion", "E": "Complete abortion"}, "answer": "C) Inevitable abortion", "expl": "จากโจทย์ผู้ป่วยหญิงมี 1st trimester bleeding+ abdominal pain + os open โดยที่ยังไม่มี passing tissue จึงตอบ Inevitable abortion", "fig": true, "figNote": "แผนภาพ Spontaneous Abortion เปรียบเทียบชนิดของการแท้ง (Threatened / Incomplete / Complete / Missed / Inevitable abortion)", "dup": ""}, {"no": "264", "seq": 264, "years": ["2017", "2019"], "stem": "หญิง 21 ปี ปวดท้อง RLQ, มี bleed per vagina, regular menses, last LMP 8 wk. PE: V/S stable, abdominal tenderness, rebound tenderness. PV: Blood clot at cervical. Cervical motion tenderness, no palpable adnexal mass. What is further investigation ? (2017, 2019)", "choices": {"A": "UPT", "B": "Serum progesterone", "C": "Transvaginal ultrasound", "D": "Transabdominal ultrasound", "E": "Explore laparotomy"}, "answer": "A) UPT", "expl": "จากโจทย์พบว่าเป็น AUB ดังนั้นขาแรกที่ต้องแยก คือผู้ป่วยตั้งครรภ์หรือไม่ เพื่อที่จะไป ddx ต่อได้ว่าเป็น 1st trimester bleeding หรือ PALM-COIEN แถมรายนี้ประจำเดือนขาดอีก ดูชงว่าตั้งครรภ์สุดๆ", "fig": false, "figNote": "", "dup": ""}, {"no": "265", "seq": 265, "years": ["2017", "2019"], "stem": "23-year-old female, was diagnosed with death fetus at GA 16 Weeks, was terminate by vaginal delivery then develop PPH. CBC showed Hb 8, WBC 10000 (N90, L10), Plt 80000. PT 20, PTT 40, TT 21.What is appropriate management? (2017, 2019)", "choices": {"A": "FFP", "B": "cryoprecipitate", "C": "Platelet concentration", "D": "hysterectomy", "E": "Tranexamic acid"}, "answer": "A) FFP", "expl": "เมื่อเกิดเหตุ PPH ต้องพิจารณาให้ส่วนประกอบของเลือด โดยเป้าหมายคือ keep / Hb > 8 g/dL (คนนี้ยังพอได้อยู่) / Platelet count > 50,000 (คนนี้ยังเกิน keep อยู่) / Fibrinogen level >2 g/L (คนนี้ไม่ได้บอก แต่ถ้าน้อยกว่านี้ ควรให้ Cryoprecipitate) / aPTT / PTT < 1.5 เท่าของค่าปกติ (คนนี้เกินไปประมาณ 2 เท่า ดังนั้น ควร correct ด้วย FFP)", "fig": false, "figNote": "", "dup": ""}, {"no": "266", "seq": 266, "years": ["2018"], "stem": "Pregnant GA 38 week มาด้วย true labor pain เคยวัดความดัน GA 8 wk BP 100-110/60-70 mmHg คราวนี้มา วัดได้ 150/100 mmHg ถามว่า Appropriate management คือ อะไร ? (2018)", "choices": {"A": "นัดมาวัดซ้ำที่ 1 wk", "B": "ยาลดความดัน", "C": "mgso4", "D": "terminate"}, "answer": "D) terminate", "expl": "จากโจทย์พยายามจะบอกว่านี่แหละเป็น new onset HT แต่ไม่มี proteinuria มั้ย ร่วมกับไม่มี severe features อื่นๆ ดังนั้น วินิจฉัยคิดว่าเป็น Gestational hypertension หรือมากสุดคือ Preeclampsia without severe features (ถ้าให้ proteinuria มาเพิ่มอ่ะนะ) ดังนั้นควร Terminate at GA 37 wk แต่คุณแม่นี่ 38 wk + in labor มาแล้ว ก็ให้คลอดเลยวันนี้สิจ้า ไม่ควรตอบ MgSO4, ยาลดความดัน เนื่องจากความดันยังไม่ถึง severe range", "fig": false, "figNote": "", "dup": ""}, {"no": "267", "seq": 267, "years": ["2018", "2021"], "stem": "A 33 year old pregnancy woman. G2P1001 GA 34 week come to ANC. She has persist headache and epigastric pain 1 day. PE show BP 150/90 mmHg, pitting edema 2+, Lab: BUN 20 Cr 1.2, Hb 10.2 WBC 10500, Plt 90000. AST 30 ALT 50. What is the diagnosis? (2018, 2021)", "choices": {"A": "Gestation GDM", "B": "Preeclampsia without severe features", "C": "Preeclampsia with severe features", "D": "Eclampsia", "E": "Chronic hypertension with superimposed preeclampsia with severe features"}, "answer": "C) Preeclampsia with severe features", "expl": "จากโจทย์พบว่ามี Hypertension แต่ไม่มี proteinuria แต่ใช่ว่าจะวินิจฉัย preeclampsia ไม่ได้เนื่องจากผู้ป่วยมี sign of severe features อื่น คือ ปวดศีรษะ จุกแน่นลิ้นปี่, Cr rising, low platelets (ถ้ามี severe features อื่น + HT ก็ไม่จำเป็นต้องมี proteinuria ก็ได้)", "fig": false, "figNote": "", "dup": ""}, {"no": "268", "seq": 268, "years": ["2018"], "stem": "Female 25 yrs come to hospital 1 wk after D&C for incomplete abortion at 8 wk gestation complaint pelvic pain and spotting per vg ,PV: minimal bloody per vg , foul smell, cervical motion tenderness ,normal Ut size , tender Lt adnexal without mass . Appropriate Mx ? (2018)", "choices": {"A": "Serum b hCG", "B": "F/U u/s1 wk", "C": "Diagnostic laparoscopic"}, "answer": "A) Serum b hCG", "expl": "จากโจทย์พบว่ามี AUB + pelvic pain + cervical motion tenderness + tender left adnexa ตามหลังจากการทำ D&C ใจคิดว่าควร ddx Endometritis >>>>>> Retained placenta แต่ถ้ามีช้อยส์มาให้แค่นี้ คิดว่าควรตอบเจาะ Serum beta-hCG เพื่อประเมินว่าชิ้นส่วนของการตั้งครรภ์หลงเหลืออยู่หรือไม่ แต่ถ้ามี choice ATB มุ่งไปกา ATB ด่วนๆ !!", "fig": false, "figNote": "", "dup": ""}, {"no": "269", "seq": 269, "years": ["2018", "2023", "2024"], "stem": "P1001 หลังคลอด 1 วัน มี Severe pain + hematoma 5 cm ถาม management ? (2018, 2023, 2024)", "choices": {"A": "Warm sit bath", "B": "Aspirate", "C": "Observe", "D": "ATB", "E": "Incision"}, "answer": "E) Incision", "expl": "จากโจทย์พบว่าเป็น Perineal hematoma หลังคลอด 5 cm และยังบอกว่ามี severe pain อีก แสดงว่าไม่สามารถ expectant ได้แล้ว ให้ตอบ Clot evacuation (ตันนี้ดีสุด) / Excision / Incision ไม่สามารถใช้ Needle aspirate ได้แล้วเพราะเลือดแข็งตัวเป็นก้อนไปแล้ว และควรไปเย็บแผลใหม่ด้วยเพราะการเกิด hematoma แสดงว่ายังมีโพรงแผลอยู่ด้านล่างที่เราเย็บไปไม่ถึงกันแผล ควรเย็บใหม่จ้า", "fig": false, "figNote": "", "dup": ""}, {"no": "270", "seq": 270, "years": ["2018"], "stem": "ผู้ป่วยหญิง 28 ปี มาด้วย Spot bleeding มา 4 วัน LMP 6 wk urine preg test +ve, v/s stable PV: blood streak vg discharge, slightly enlarge ut, mild tender at Lt adnexa ultrasound : empty uterus, no adnexal mass, no fluid in cal-de-sac. what is appropriate management? (2018)", "choices": {"A": "serial Hct", "B": "serum b-hcg", "C": "f/u อีก 1 mo", "D": "diagnostic laparoscopy"}, "answer": "B) serum b-hcg", "expl": "จากโจทย์พบว่ามีการตั้งครรภ์จริงจาก UPT positive แต่ US แล้วยังไม่พบถุงการตั้งครรภ์ทั้งในและนอกมดลูก ดังนั้นควรเจาะด่า Serum beta-hCG ประเมินว่ามีค่าเท่าไหร่ / ถ้า < 3,510 แล้วยังไม่เห็น อาจเป็น Early intrauterine pregnancy / Pregnancy unknown location ก็ได้แนะนำให้ serial อีกครั้ง next 48 hr / ถ้า > 3,510 แล้วยังไม่เห็น --> ให้ dx Pregnancy unknown location แล้วรักษาได้เลย", "fig": false, "figNote": "", "dup": ""}, {"no": "271", "seq": 271, "years": ["2018", "2022"], "stem": "30 ปี primigravida GA 38 wk มาด้วย PROM with labor pain 2 hr ตรวจร่างกาย FH 34 cm, longitudinal lie ,cephalic presentation LOA cervix dilate 6 cm eff 80% UC interval 2 min30 sec moderate intensity duration 45 sec prolapse cord in vagina U/S no fetal heart sound most appropriate management ? (2018, 2022)", "choices": {"A": "Tocolysis", "B": "Spontaneous delivery", "C": "C/S", "D": "....."}, "answer": "B) Spontaneous delivery", "expl": "จากโจทย์ term pregnancy with in labor ตรวจร่างกายมี prolapse cord แต่ว่าลูกเสียแล้ว กลายเป็น DFIU เพราะฉะนั้น \"ให้คลอดทางช่องคลอด\" ไม่ควรเอาไปผ่า เพราะนอกจากจะไม่ได้ลูกแล้ว ยังเป็นการเพิ่มภาวะแทรกซ้อนจากการผ่าตัดให้มารดาอีก และไม่ควรให้ tocolysis ไม่มีข้อบ่งชี้เลย", "fig": false, "figNote": "", "dup": ""}, {"no": "272", "seq": 272, "years": ["2018"], "stem": "A female G1P0 GA 28 weeks, has rupture of membrane for an hour, PV : 6 cm dilate, 80% effacement, มี cord prolapse, FHR 140 bpm. What is the initial management ? (2018)", "choices": {"A": "oxygen mask with bag", "B": "Left lateral decubitus position", "C": "Direct push fetal head", "D": "Electronic fetal heart rate monitoring", "E": "Cesarean section"}, "answer": "C) Direct push fetal head", "expl": "จากโจทย์พบว่าผู้ป่วยมีภาวะ Prolapse cord ดังนั้น level น้องๆ ลองดูโจทย์ดีๆนะ / ถ้าถาม Initial management : ควรตอบเอามือดันหัวเด็กไว้ เป็นสิ่งที่เราทำได้ง่ายที่สุด / ถ้าถาม Appropriate / Definite management : ควรตอบ Emergency C/S", "fig": false, "figNote": "", "dup": ""}, {"no": "273", "seq": 273, "years": ["2018"], "stem": "20 year old female, primigravida GA 38 wks Presents with fever for 4 hr. She had a history of leakage of fluid from her vagina. PE: BT 38.5 RR20 P120 BP110/80 mmHg Height of fundus 3/4 above umbilicus, mild tenderness, uterine contraction duration 50 sec, interval 3 min, moderate intensity FHS 150 /min PV: cervical dilatation 5 cm, effacement80%, station 0, membrane rupture with foul smell odor What is the most appropriate management? (2018)", "choices": {"A": "continue fetal monitoring", "B": "broad spectrum ATB", "C": "strep gr B prophylaxis", "D": "oxytocin augmentation", "E": "cesarean section"}, "answer": "B) broad spectrum ATB", "expl": "จากโจทย์พบว่าผู้ป่วยมีไข้ + น้ำเดิน + ปวดท้อง ทำให้นึกถึงภาวะ Chorioamnionitis มากที่สุด ซึ่งหลักการรักษาคือ / ให้ Start antibiotic : Ampicillin + Gentamicin (จึงตอบ choice B) / พิจารณาให้ยาลดไข้ร่วมด้วย / พิจารณาให้คลอดเลยหลังจากวินิจฉัย โดยให้ Augmentation of labor หากไม่มี contraindication (ให้ C/S ตาม OB indication) / พิจารณาให้ Dexamethasone เพื่อกระตุ้นปอดได้ (แต่รายนี้ term แล้ว ไม่ต้องให้จ้า)", "fig": false, "figNote": "", "dup": ""}, {"no": "274", "seq": 274, "years": ["2018", "2020"], "stem": "Female 35 year old P1 presented with profound vaginal bleeding after complete placental delivery. BP100/75 HR 80 O2sat 95% room air. Uterine firm was noted. What is the diagnosis? (2018, 2020)", "choices": {"A": "Uterine atony", "B": "Cervical laceration", "C": "Amniotic fluid emboli", "D": "Retained placenta pieces", "E": "Threatening uterine rupture"}, "answer": "D) Retained placenta pieces", "expl": "จากโจทย์พบว่ามี Profound vaginal bleeding หลังรกคลอด แสดงว่าต้องการให้น้อง ddx cause ที่เป็นไปได้ ซึ่งลองมาต์ด choice ดู / Uterine atony : ไม่ควรตอบในข้อนี้ เพราะมีประโยชน์ที่เขียนว่า Firm uterus / Cervical laceration : ไม่มี clues ปกติ น่าจะมีบอกเช่น ทารกตัวใหญ่ / ใช้ Forceps หรือ Vacuum / Amniotic fluid emboli : ไม่ได้มา present ด้วย PPH / Retained pieces of placenta : เป็นไปได้ (ถ้าจะมี clues ที่ทำให้นึกถึง อาจบอกว่าเช็ครกแล้วไม่ครบวง) / Threatening uterine rupture : ควรจะมีอาการปวดท้องนำมาก่อน + เลือดออก และส่วนมากเป็นตั้งแต่ช่วงก่อนคลอด", "fig": false, "figNote": "", "dup": ""}, {"no": "275", "seq": 275, "years": ["2018"], "stem": "A 32 year old women priming primigravida GA12 wk, complains of severe nausea and vomiting without vaginal bleeding. She got this current pregnancy after clomiphene citrate intake. PE: fundal height is 2/3 above suprapubic. What is the most useful investigation ? (2018)", "choices": {"A": "Serum bhCG", "B": "Serum electrolyte", "C": "Trans abdominal ultrasonography", "D": "75 g OGTT", "E": "Thyroid function test"}, "answer": "E) Thyroid function test", "expl": "จากโจทย์มี Hyperemesis gravidarum ดังนั้นจึงควรตรวจหาสาเหตุที่เป็นไปได้เพิ่มเติมเช่น Hyperthyroidism ร่วมกับปรับยาเพิ่ม", "fig": false, "figNote": "", "dup": ""}, {"no": "276", "seq": 276, "years": ["2018", "2021", "2023"], "stem": "A 25-year-old female, G2P1, GA 40 weeks with labor pain for 10 hours. PV : fully dilated cervix, cephalic presentation, station 2+, ruptured membrane. After fetal head is delivered, the fetus shoulder is obstructed in the birth canal. The fetal heart rate is 120/min. What is the management appropriate first thing to do? (2018, 2021, 2023)", "choices": {"A": "McRoberts maneuver", "B": "Suprapubic pressure", "C": "Wood screw maneuver", "D": "Rubin maneuver", "E": "Posterior shoulder deliver"}, "answer": "A) McRoberts maneuver", "expl": "เมื่อเกิด Shoulder dystocia ควรมีการวางแผนการรักษาดังนี้ / Call for HELP !! : OB, PED, Anes / Empty bladder / Widen episiotomy / Maneuver ต่างๆ เพื่อแก้ไขภาวะคลอดติดไหล่ : McRobert's maneuver ง่ายและเร็วสุด, Suprapubic pressure, Delivery of posterior shoulder, Rubin maneuver, Wood's corkscrew maneuver และ All-fours (Gaskin) maneuver", "fig": false, "figNote": "", "dup": ""}, {"no": "277", "seq": 277, "years": ["2019"], "stem": "ผู้หญิงอายุ 35 ปี GA 36 weeks มาด้วยชัก 2ครั้งใน 30 นาที PE — BP170/110 mmHg, uterine contraction duration 30-45 seconds interval 2-3minutes, cervix dilate 1 cm. What is the initial management ? (2019)", "choices": {"A": "Oxytocin IV", "B": "Diazepam", "C": "Amniotomy", "D": "MgSO4", "E": "Emergency C/S"}, "answer": "D) MgSO4", "expl": "จากโจทย์พบว่ามี Hypertension + Seizure ดังนั้นจึงชวนสงสัยภาวะ Eclampsia มากที่สุด ซึ่งแนวทางการรักษาจะคล้ายกับภาวะ Preeclampsia with severe features เลย นั่นก็คือต้องให้ MgSO4 stabilize ผู้ป่วยก่อนจ้า", "fig": false, "figNote": "", "dup": ""}, {"no": "278", "seq": 278, "years": ["2019"], "stem": "A pregnant, GA 5 weeks by LPM, present with vaginal bleeding for 1 day. PV — closed cervical os with minimal bleeding, normal uterus, not tender, no adnexal mass. TVS — gestational sac, yolk sac, embryonic pole with CRL 3 mm, fetal heart isn't visible. What is the diagnosis ? (2019)", "choices": {"A": "Blighted ovum", "B": "Inevitable abortion", "C": "Threatened abortion", "D": "Dead fetus in utero", "E": "Missed abortion"}, "answer": "E) Missed abortion", "expl": "จากโจทย์พบว่าเป็น 1st trimester bleeding + closed os แต่ตรวจ US พบว่ามี nonviable fetus ดังนั้นจึงตอบว่า missed abortion แต่ถ้าข้อนี้เปลี่ยนเป็น พบ normal fetal cardiac activity ก็จะตอบ threatened abortion แทน", "fig": false, "figNote": "", "dup": ""}, {"no": "279", "seq": 279, "years": ["2019"], "stem": "G2P1 GA 35 weeks presents with fluid leak per vagina 4 hours, BP 150/90 (no severe feature), no uterine contraction, cervical dilate 1 cm, effacement 100%, station -1. What is the proper management ? (2019)", "choices": {"A": "Nifedipine oral", "B": "Oxytocin", "C": "MgSO4", "D": "Prostaglandins E2 analog suppository", "E": "Emergency C/S"}, "answer": "B) Oxytocin", "expl": "จากโจทย์พบว่ามีภาวะ PPROM GA >34 wk + Hypertension (ไม่รู้เป็นแค่ GHT หรือเป็น Preeclampsia without severe features แต่สุดท้ายแล้วคิดไม่ต่างกัน) / สำหรับเรื่อง HT ถ้าไม่ได้มี Severe features เราสามารถ expectant และรอคลอดที่ GA 37 wk ได้ ส่วนความดันก็ยังไม่ได้ถึง range ที่ต้องให้ยาลดความดัน / สำหรับเรื่อง PPROM GA > 34 wk ให้ปรึกษากับผู้ป่วย discuss เรื่องข้อดี ข้อเสียในการ Expectant VS Induction of labor เลย แต่ในเมื่อไม่มี choice expectant ดังนั้นจึงขอตอบ Oxytocin for induction of labor (ตอบ PGE2 ได้มั้ย ก็ได้ แต่ไม่ถูกต้องที่สุด เนื่องจากมีภาวะน้ำเดินแล้ว การให้ยาเข้าไปทางช่องคลอดอาจเพิ่ม rate infection ให้ผู้ป่วยได้)", "fig": false, "figNote": "", "dup": ""}, {"no": "280", "seq": 280, "years": ["2019"], "stem": "GA 32 weeks มาด้วย labor pain 8 hr ไม่มีน้ำเดิน Uterine contraction duration 45-60 seconds interval 4-5 minutes, cervical dilate 5 cm, effacement 100 %, membrane intact. What is the proper management ? (2019)", "choices": {"A": "Tocolytic drug", "B": "Artificial rupture of membranes (ARM)", "C": "GBS prophylaxis", "D": "Emergency C/S"}, "answer": "C) GBS prophylaxis > A) Tocolytic drug", "expl": "จากโจทย์พบว่าผู้ป่วย GA 32 wk + มี UC + เป็น active phase of labor ดังนั้นสิ่งที่ควรทำเมื่อมา admit คือ / GBS prophylaxis : เนื่องจากเป็น preterm labor ที่เข้า active phase of labor แล้ว / Tocolytic drug : ให้เพื่อรอ Dexamethasone ครบ course แต่คนไข้คนนี้ดูเหมือนจะเอาไม่อยู่แล้ว / Dexamethasone : Promote lung maturity (แต่ถ้ามาถึง 5 cm ขนาดนี้ อาจจะไม่ทันครบคอร์สก็คลอดก่อน) / ห้าม !! ตอบ ARM น้องเป็น early preterm อยู่เลย อย่าไปเร่งคลอด, Emergency C/S ก็ยังไม่มีข้อบ่งชี้เลย", "fig": false, "figNote": "", "dup": ""}, {"no": "281", "seq": 281, "years": ["2019"], "stem": "A 30-year-old pregnant GA 34 weeks มา ANC ไม่มีอาการอะไรผิดปกติ ตรวจร่างกาย วัด BP ได้ 150/90 mmHg (repeat in next 1 hour 150/90 mmHg), urine protein dipstick 1+, fundal height 34 cm, longitudinal lie, cephalic presentation, no uterine contraction, FHR 150 bpm. What is the appropriate management ? (2019)", "choices": {"A": "CBC, BUN, Cr, LFT, uric acid, coag", "B": "Fetal biophysical profile", "C": "MgSO4 stabilization", "D": "Nifedipine administration", "E": "Induction to labor"}, "answer": "A) CBC, BUN, Cr, LFT, uric acid, coag > B) Fetal biophysical profile", "expl": "จากโจทย์พบว่าผู้ป่วยมี Hypertension + Proteinuria ดังนั้นจึงวินิจฉัยภาวะ Preeclampsia จึงควรตรวจ lab เพิ่มเติมว่ามี Severe features ใดๆร่วมด้วยหรือไม่ จึงตอบ A เพราะ / ถ้ามี Severe features ก็ควรให้ MgSO4 + termination of pregnancy at 34 wk / ถ้าไม่มี Severe features สามารถ Expectant + termination of pregnancy at GA 37 wk / ส่วน Fetal biophysical profile ต้องตรวจมั้ย ก็ควรต้องตรวจเพื่อประเมินสุขภาพทารกในครรภ์ แต่น่าจะไม่ใช่จุดประสงค์ที่ต้องการวัดความรู้ในข้อนี้", "fig": false, "figNote": "", "dup": ""}, {"no": "282", "seq": 282, "years": ["2019"], "stem": "A pregnant GA 35 weeks no uterine contraction, cervical dilate 1 cm, effacement 25 %, station -2. What is the most proper management ? (2019)", "choices": {"A": "Nifedipine", "B": "Oxytocin augmentation", "C": "MgSO4", "D": "PGE2", "E": "Emergency C/S"}, "answer": "....?????....", "expl": "จากโจทย์เดาว่าจดมาไม่ครบ ถ้าให้มาแค่นี้ผู้ป่วยจะกลายเป็น Late preterm labor เพราะ GA > 34 wk ดังนั้นจึงไม่มีข้อบ่งชี้ในการให้ tocolytic และควร expectant management ปล่อยไปเรื่อยๆ ไม่ควรรีบ augment / induct ให้รีบคลอดเลย", "fig": false, "figNote": "", "dup": ""}, {"no": "283", "seq": 283, "years": ["2019"], "stem": "GA 41 weeks female P1 stable weight. Come to antenatal clinic because feeling less motion. PE — no uterine contraction, fundal 3/4 above umbilicus, cephalic presentation, head engaged. PV— membrane intact, cervical dilated 2 cm, effacement 50 %, anterior, soft, station 0. US — placenta uterus posterior high, FHR 155, AFI 3.5, NST reactive, Estimated weight 3,250 gram. What is the most appropriate management ? (2019)", "choices": {"A": "Advice and follow-up next 1 week", "B": "Ultrasound and NST next week", "C": "Cervical preparation withPGE2", "D": "Amniotomy", "E": "C/S"}, "answer": "D) Amniotomy", "expl": "จากโจทย์พบว่าเป็น Term pregnancy มาด้วยลูกดิ้นน้อย แต่ NST reactive แสดงว่าสุขภาพลูกยังปกติดี แต่อ่านดีๆ \"AFI 3.5 cm\" แปลว่า oligohydramnios ซึ่งปกติภาวะนี้เราควรให้คลอดตั้งแต่ GA 37 wk ดังนั้นข้อนี้ตอบข้อที่ให้กลับบ้านจ๋า ต้องให้คลอดเลย โจทย์บอกเพิ่มคือ PV แล้วได้ตามนี้ ลองคิด BISHOP score ให้แล้วได้ 8 คะแนน ก็ดู Cervix พร้อมประมาณนึงแล้ว ดังนั้นจึงอยากชักนำการคลอดด้วยยา Oxytocin / หัตถการ Amniotomy", "fig": true, "figNote": "Table: 'Bishop scoring system:' with columns Score/Dilation(cm)/Position of cervix/Effacement(%)/Station(-3 to +3)/Cervical Consistency and rows for scores 0-3", "dup": ""}, {"no": "284", "seq": 284, "years": ["2019"], "stem": "A 36 years old primipara, with no ANC, complaints with headache and abdominal discomfort for 1 day. PE: BP 160/110 mmHg, fundal height 3/4 above umbilicus, no head engagement, longitudinal lie, uterine contraction — duration 30-35 seconds, interval 8-10 minutes, mild intensity. PV — os closed, no effacement. After give MgSO4, BP 130/110 mmHg and her symptoms of headache and abdominal discomfort was improve. Lab — Hct 35 %, WBC 6,500 cell/mm3, plt 300,000 /mm3, AST 24 IU, ALT 30 IU, UA — protein 1+, Ultrasound — single viable fetus, EFW 2,600 gram, anterior placenta, no placenta previa. What is most appropriate management ? (2019)", "choices": {"A": "Dexamethasone administration", "B": "Induction of labor", "C": "C/S", "D": "Tocolytic drug", "E": "Observe"}, "answer": "B) Induction of labor", "expl": "จากโจทย์พบว่าเป็น Preeclampsia with severe features แถม drip MgSO4 ให้แล้วด้วย ดังนั้น ต่อมาให้มาประเมิน GA ว่าเกิน 34 มั้ย ถ้าเกิน 34 แล้วให้ termination of pregnancy เลย แต่ถ้ายังไม่เกิน สามารถให้ expectant management จนถึง GA 34 wk ได้ ในกรณีที่ไม่มีข้อห้าม โดยโจทย์ให้ clues มาคือ EFW 2,600 g ก็คือดูน้ำหนักเท่าเด็ก term แล้ว ดังนั้นจึงคิดว่าตอบให้คลอดเลย ทาง Vaginal delivery ได้เนื่องจากไม่มีข้อห้าม จึงตอบ Induction of labor", "fig": false, "figNote": "", "dup": ""}, {"no": "285", "seq": 285, "years": ["2019", "2022"], "stem": "A pregnant woman delivered a 4,000- gram-baby via vacuum extraction. She experienced active bleeding after the delivery of the baby. After the delivery of placenta, active bleeding still persist. After rapid infusion of oxytocin, there is active bleeding despite adequate uterine contraction. What is the next appropriate management ? (2019, 2022)", "choices": {"A": "Methergin IV", "B": "Uterine compression", "C": "Uterine packing", "D": "Hysterectomy", "E": "Birth canal exploration"}, "answer": "E) Birth canal exploration", "expl": "จากโจทย์พบว่าน่าจะมีภาวะ Postpartum hemorrhage จึงถามหา cause ซึ่งจากโจทย์คือชวนมาว่าลูกตัวใหญ่ + ใช้ Vacuum extraction จึงน่าจะมีปัญหาเรื่องแผลที่ช่องทางคลอดมากที่สุดจึงตอบ Birth canal exploration อีกข้อสนับสนุนคือ โจทย์บอก Adequate uterine contraction แสดงว่าไม่ใช่ uterine atony แน่ๆแล้วจ้า", "fig": false, "figNote": "", "dup": ""}, {"no": "286", "seq": 286, "years": ["2019"], "stem": "A 40 years old female GA 34 presented with vaginal bleeding for 3 hours. Diagnosed chronic hypertension since GA12 weeks. PE — BP 140/100 mmHg, PR 100 bpm, RR 20 /min, fundal height 34 weeks, FHS 120 bpm, increase uterine contract every 2 minutes. What is the most likely diagnosis ? (2019)", "choices": {"A": "Vasa previa", "B": "Coagulopathy", "C": "Placenta previa", "D": "Abruptio placenta", "E": "Labor pain with excessive mucous bloody show"}, "answer": "D) Abruptio placenta", "expl": "จากโจทย์พบว่ามีภาวะ Antepartum hemorrhage ที่เป็น Painful bleeding + tachysystole + Chronic hypertension ซึ่งเป็นความเสี่ยง จึงนึกถึงภาวะ Abruptio placenta มากที่สุด", "fig": false, "figNote": "", "dup": ""}, {"no": "287", "seq": 287, "years": ["2019", "2022"], "stem": "แม่ exclusive breast feeding หลังคลอด 2 สัปดาห์ มาด้วยเรื่องเจ็บหน้าอกข้างซ้าย ให้ลูกกินนมทุก 4 ชั่วโมง PE — BT 37.6 °C, RR 20 / min, PR 100 bpm. Left breast — redness, warmth, tenderness, engorgement, no pus or discharge from nipple. What is the most appropriate management ? (2019, 2022)", "choices": {"A": "Stop breast feeding", "B": "Warm compression", "C": "Frequency breastfeeding", "D": "Oral antibiotic", "E": "Breast binder"}, "answer": "D) Oral antibiotic", "expl": "จากโจทย์มีอาการเจ็บบริเวณเต้านม + กดเจ็บข้างเดียว จึงเหมือน Mastitis > Breast engorgement (ปกติถ้าจะเป็น Breast engorgement โจทย์ของน้องมักจะให้มาตรงๆ เป็นคำว่าตรวจร่างกายพบ engorged) ดังนั้นหลักการรักษาคือ / ATB : Dicloxacillin (500) 1 tab PO four times daily x 10-14 days, หรือ Cephalexin 500 mg PO qid (ในกรณีที่แพ้ยา Penicillin สามารถพิจารณาให้ Erythromycin หรือ clindamycin แทนได้) / ให้นมลูกต่อได้ปกติทั้ง 2 ข้าง / Oral analgesia (Para / NSAIDs), Cool packs เพื่อลดอาการปวด / ส่วน choice ข้ออื่น เช่น Warm compression, Frequency breastfeeding ก็ควรทำควบคู่กันไป แต่ไม่ใช่ Specific management ในโจทย์ข้อนี้", "fig": false, "figNote": "", "dup": ""}, {"no": "288", "seq": 288, "years": ["2019", "2022"], "stem": "ผู้หญิง 35 ปี มาด้วยปวดท้องและมีไข้ 1 วันก่อนมาโรงพยาบาล status post cesarean section last 2 weeks. PE —BT 38 °C. PR 100 bpm, RR 20 /min, BP 110/60 mmHg, normal surgical wound, no guarding, no rebound tenderness. PV — 20-week uterine size with tenderness, foul smell lochia. What is the appropriate management ? (2019, 2022)", "choices": {"A": "Cefazolin", "B": "Carbapenem", "C": "Vancomycin", "D": "Clindamycin + Gentamicin", "E": "Ampicillin + Gentamicin"}, "answer": "D) Clindamycin + Gentamicin", "expl": "จากโจทย์ผู้ป่วยมาด้วย ปวดท้อง + มีไข้ + น้ำคาวปลากลิ่นเหม็นหลังคลอด จึงทำให้นึกถึงภาวะ Endometritis มากที่สุด ซึ่งยาฆ่าเชื้อที่ควรให้ ก็ใช้ regimen ตามตารางด้านล่างได้เลย แต่ Gold standard = Clindamycin + Gentamicin", "fig": true, "figNote": "TABLE 37-2. Antimicrobial Regimens for Pelvic Infections Following Cesarean Delivery, with Regimen/Comments columns listing Clindamycin + gentamicin (Gold standard), Clindamycin + aztreonam, Extended-spectrum penicillins, Cephalosporins, Vancomycin, Metronidazole + ampicillin + gentamicin, Carbapenems", "dup": ""}, {"no": "289", "seq": 289, "years": ["2020"], "stem": "Female 38 years G1P0 GA 42 wk. comes for induction of labor. PE: FH ¾ above umbilicus, FHR 160 bpm ผู้ป่วยได้รับ 50 mcg of misoprostol+oxytocin Next 4 hours, PE: vaginal bleeding, abdominal tenderness, palpable fetal part, BP80/60mmHg PR 120 bpm. What is the cause of the symptoms ? (2020)", "choices": {"A": "Primigravida", "B": "Postterm", "C": "Fetal macrosomia", "D": "Maternal age", "E": "High dose misoprostol augmentation"}, "answer": "E) High dose misoprostol augmentation", "expl": "จากโจทย์ Keyword ในข้อนี้คือมีการใช้ยา Misoprostol + Oxytocin เพื่อ induction จากนั้นปวดท้อง + เลือดออก + vital sign unstable และคลำ fetal part ได้ชัด แสดงว่าลูกน่าจะลอยออกมาจากมดลูกที่แตกไปแล้วเรียบร้อย ซึ่ง Uterine rupture นี้น่าจะมีสาเหตุมาจากการใช้ยาที่มากเกิน", "fig": false, "figNote": "", "dup": ""}, {"no": "290", "seq": 290, "years": ["2020"], "stem": "A pregnant woman G6P5 presents with 3rd stage bleeding. What is the cause of bleeding in this patient? (2020)", "choices": {"A": "Uterine atony", "B": "Vaginal canal tear", "C": "Uterine rupture", "D": "Coagulopathy"}, "answer": "A) Uterine atony", "expl": "จากโจทย์ให้มาน้อยเหลือเกิน แต่ลองดู ผู้ป่วยเป็น Multiparity ดังนั้นจึงมีความเสี่ยงต่อ uterine atony มากที่สุด ถามว่าข้ออื่นเป็นไปได้มั้ย ก็เป็นไปได้ แต่โจทย์ไม่ได้ชงให้ดูไปทางนั้น", "fig": false, "figNote": "", "dup": ""}, {"no": "291", "seq": 291, "years": ["2020"], "stem": "A 25 year-old female primigravida, GA 10 week by LMP, presented with vaginal bleeding. PE: V/S normal, no abdominal tenderness. TVS: empty uterus with hypoechoic 3cm right adnexal mass. Either Rt. Ectopic pregnancy or Rt. Corpus luteal cyst is considered diagnosis. What is the most proper management? (2020)", "choices": {"A": "Serum B-hCG", "B": "Methotrexate administration", "C": "Follow up + TVS next 2 weeks", "D": "Diagnostic laparoscopy", "E": "Laparotomy"}, "answer": "A) Serum B-hcg", "expl": "จากโจทย์พบว่า AUB + น่าจะมีการตั้งครรภ์ 10 wk แต่ US แล้วยังไม่พบถุงการตั้งครรภ์ทั้งในและนอกมดลูก ร่วมกับพบ abnormal adnexal mass ที่ไม่รู้ว่าก้อนอะไรแน่ๆเลย ดังนั้นควรเจาะค่า Serum beta-hCG ประเมินว่ามีค่าเท่าไหร่ / ถ้า < 3,510 แล้วยังไม่เห็น อาจเป็น Early intrauterine pregnancy / Pregnancy unknown location with corpus luteal cyst ก็ได้แนะนำให้ serial next 48 hr / ถ้า > 3,510 แล้วยังไม่เห็น à ให้ dx Pregnancy unknown location แล้วรักษาได้เลย / ถ้า < 10 ก็จะได้มั่นใจว่าน่าจะเป็น Corpus luteal cyst", "fig": false, "figNote": "", "dup": ""}, {"no": "292", "seq": 292, "years": ["2020", "2024"], "stem": "A 40 years old woman puerperium presented with vaginal bleeding for 5 days. She used 10 pads/day after the caesarean section for 2 weeks. She had C/S due to fetal distress. V/S: stable PE: 18 weeks size uterus with tenderness, bleeding per vagina, os open 1 fingertip What is the most proper treatment ? (2020, 2024)", "choices": {"A": "Antibiotics", "B": "Tranexamic acid", "C": "Dilation and curettage", "D": "Uterine artery embolization", "E": "Hysterectomy"}, "answer": "C) Dilation and curettage", "expl": "จากโจทย์พบว่าผู้ป่วยมาด้วยเรื่อง Late postpartum hemorrhage ไม่ปวดท้อง ไม่มีไข้ ตรวจร่างกายพบ uterus ยังขนาดค่อนข้างใหญ่เหมือนหลังคลอดใหม่ๆ ดังนั้นต้องกังวลเรื่องมีเนื้อเยื่ออยู่ด้านใน ก็คือ Retained placenta มากที่สุด จึงตอบ D&C (ข้อนี้ไม่มีไข้ ไม่มีปวดท้อง จึงไม่ค่อยเหมือน Endometritis)", "fig": false, "figNote": "", "dup": ""}, {"no": "293", "seq": 293, "years": ["2021"], "stem": "A 30-year-old female G2P1001 GA 36 wk with a history of previous C/S came to the hospital with bright red blood bleeding per vagina. PE: P120/min, BP 80/60 mmHg, generalized abdominal tenderness with rebound tenderness, palpable fetal part. What is the most likely diagnosis? (2021)", "choices": {"A": "Placenta previa", "B": "Abruptio placenta", "C": "Uterine rupture", "D": "Ruptured Vasa previa", "E": "Mucous blood show"}, "answer": "C) Uterine rupture", "expl": "จากโจทย์ Keyword ในข้อนี้คือมี Previous C/S มี Antepartum hemorrhage + peritonitis + palpable fetal part แสดงว่าลูกน่าจะลอยออกมาจากมดลูกที่แตกไปแล้วเรียบร้อย จึงตอบ Uterine rupture", "fig": false, "figNote": "", "dup": ""}, {"no": "294", "seq": 294, "years": ["2021"], "stem": "A 18 years old female G2P0 GA 32 weeks presents with fluid leakage from vagina 2 hr PTA. No fever, no abdominal pain, normal fetal movement as the day before. What is the next appropriate management ? (2021)", "choices": {"A": "Nitrazine test", "B": "U/S", "C": "Cervical swab culture", "D": "PV", "E": "EFM"}, "answer": "A) Nitrazine test", "expl": "จากโจทย์อยากทราบว่าเป็น PPROM จริงหรือไม่ จึงควรตรวจสิ่งที่จะช่วย confirm ว่าน้ำเดินจริง คือ Nitrazine test วิธี prove น้ำเดินอื่นๆ คือ Sterile dry speculum (ต้องใส่อุปกรณ์ ไม่ใช่ PV ด้วยนิ้วเฉยๆ), Cough test, Fern test, Biochemical study (PAMG-1)", "fig": false, "figNote": "", "dup": ""}, {"no": "295", "seq": 295, "years": ["2021", "2024"], "stem": "A 34 yr women has been aborted for 3 pregnancies at 7,8 ,11 wk What is the most likely cause of her miscarriage? (2021, 2024)", "choices": {"A": "Myoma uteri", "B": "Bicornuate uterus", "C": "Recurrent infection", "D": "Cervical incompetence", "E": "Chromosome abnormality"}, "answer": "E) Chromosome abnormality", "expl": "สาเหตุส่วนใหญ่ประมาณ 50% ของภาวะ Early pregnancy loss ในช่วง 1st trimester คือ Chromosomal abnormalities เช่น Trisomy 21, Monosomy", "fig": false, "figNote": "", "dup": ""}, {"no": "296", "seq": 296, "years": ["2021"], "stem": "Thai female 28 years old G1P0 GA38wks คลอดลูกที่บ้านมาแล้ว 2 hrs PTA แต่รกยังไม่คลอด แม่ V/S BP120/80 PR100 ทำ cord controlled traction แล้วเกิด avulsed cord ควรทำอะไรต่อ ? (2021)", "choices": {"A": "Manual extraction of placenta", "B": "Crede maneuver", "C": "Ergonovine"}, "answer": "A) Manual extraction of placenta", "expl": "จากโจทย์พบว่าผู้ป่วยรายนี้รกยังไม่คลอด แม้ผ่านไปกว่า 30 นาทีแล้วหลั xytocin", "C": "Misoprostol", "D": "MVA", "E": "D&C"}, "answer": "....?????....", "expl": "ข้อนี้แนะนำให้อ่านให้ดีๆว่าเข้าเกณฑ์ Early pregnancy loss หรือไม่ ถ้าเข้าเกณฑ์ควร termination of pregnancy ด้วย medical / surgical แต่ถ้ายังไม่เข้าเกณฑ์ให้ F/U ได้ โดย Criteria มี 4 ข้อดังนี้ / CRL > 7 mm แต่ยังไม่มี fetal heart beat / MSD > 25 mm แต่ยังไม่มี embryo / มี gestational sac + yolk sac → follow US 11 วัน ยังไม่เห็น embryo + fetal heart / มี gestational sac แต่ไม่มี yolk sac→ follow US 14 วัน ยังไม่มี embryo + fetal heart beat", "fig": false, "figNote": "", "dup": ""}, {"no": "300", "seq": 300, "years": ["2021"], "stem": "หญิงท้อง GA 25 Wk no u/d, presented progressive dyspnea on exertion PE: JVP 5 cm above sternal notch, PMI at 6th ICS anterior mid axillary line, rales breath sound both lower lungs, pitting edema both legs ถาม appropriate management ? (2021)", "choices": {"A": "PO......", "B": "IV furosemide", "C": "Dobutamine", "D": "IV morphine", "E": "IV nitroglycerin"}, "answer": "B) IV furosemide", "expl": "แนวทางการรักษา Pulmonary edema จาก heart failure ในคนท้องคือ / เริ่มจากให้ diuretic เพื่อลด preload ก่อนโดยแนะนำ Furosemide (Lasix) / ลด afterload โดยถ้ามี hypertension ให้ยา Hydralazine, nifedipine, another vasodilator / อาจพิจารณาให้ Beta-blockers เพื่อลด mortality rate / อาจพิจารณาให้ Digoxin เพื่อเป็น inotropic support", "fig": true, "figNote": "Small decorative illustration of a heart with band-aids", "dup": ""}, {"no": "301", "seq": 301, "years": ["2022"], "stem": "A 38-year-old pregnant woman, G2P1, GA 37 weeks, comes to the antenatal clinic because she decreased fetal movement. Ultrasonography shows no cardiac activity. Pelvic examination show cervical dilatation of 1 cm, 50% effacement, mild irregular uterine contraction and cephalic presentation. What is the most appropriate next management? (2022)", "choices": {"A": "Observe labor pain", "B": "Misoprostol vaginal suppository", "C": "Oxytocin IV", "D": "Amniotomy", "E": "Cesarean delivery"}, "answer": "B) Misoprostol vaginal suppository", "expl": "จากโจทย์ term pregnancy with in labor แต่ว่าลูกเสียแล้ว กลายเป็น DFIU เพราะฉะนั้น \"ให้คลอดทางช่องคลอด\" ไม่ควรเอาไปผ่า เพราะนอกจากจะไม่ได้ลูกแล้ว ยังเป็นการเพิ่มภาวะแทรกซ้อนจากการผ่าตัดให้มารดาอีก ดูข้อมูลเพิ่มอีกนิดข้อนี้พบว่า Cervical dilation 1 cm, 50% คิดว่ารวมๆ น่าจะประเมิน BISHOP score ออกมาแล้วน่าจะเป็น Unfavorable of cervix ดังนั้นจึงควร prime cervix + เพิ่ม contraction ด้วย misoprostol ก่อน", "fig": false, "figNote": "", "dup": ""}, {"no": "302", "seq": 302, "years": ["2022"], "stem": "A female patient G1P0A1 GA 33 weeks presents with fluid leakage. PE : vertex presentation, uterine contraction interval 3 minutes, duration 45 seconds, FHR 90 bpm. PV : cervical dilate 3 cm., effacement 100%, station O, membrane rupture and pulsatile tubular structure protruding. What is the most appropriate initial management? (2022)", "choices": {"A": "Bladder filling", "B": "Lift the presenting part", "C": "Left lateral decubitus", "D": "Emergency Cesarean delivery", "E": "Fowler position"}, "answer": "B) Lift the presenting part", "expl": "จากโจทย์ Keyword คือ PV พบ cord-like pulsatile mass per os + fetal bradycardia จึงสงสัยภาวะ Prolapsed cord ดังนั้น Initial management จึงควรทำท่า maneuver ต่างๆ เพื่อไม่ให้ umbilical cord โดนกด คือ / Pushing up : PV ดันนิ้วให้ลอยตลอด / Knee-chest position / Trendelenburg position : เพื่อให้ส่วนนำไหลกลับเข้าไป / Filling maternal urinary bladder : ใส่ NSS 300-500 ml เข้าไป เพื่อให้ส่วนนำลูกดันขึ้นไป", "fig": false, "figNote": "", "dup": ""}, {"no": "303", "seq": 303, "years": ["2022"], "stem": "A breastfeeding mother comes to the OPD clinic with bilateral breast congestion. Physical examination shows no swelling, no tenderness, no redness, no palpable mass. Her vital signs are normal. What is the proper management? (2022)", "choices": {"A": "Hot pack compression", "B": "Dicloxacillin", "C": "Frequent breastfeeding", "D": "xx"}, "answer": "C) Frequent breastfeeding", "expl": "จากโจทย์ Keyword คือมีแต่ Bilateral breast congestion ดูเหมือนภาวะ Breast engorgement ดังนั้นไม่จำเป็นต้องให้ Antibiotics แต่ให้ Supportive treatment ด้วยการให้นมบ่อยขึ้น, Cool pack ประคบแก้ปวด, ยาแก้ปวดตามอาการ, ใส่ Breast support", "fig": false, "figNote": "", "dup": ""}, {"no": "304", "seq": 304, "years": ["2022"], "stem": "A G3P2 GA 38 weeks woman with history of previous Cesarean delivery presents with labor pain for 5 hours. Her pain aggravates for the last 30 minutes. Her vital signs show hypotension, and absent fetal heart sounds. What is the most likely diagnosis? (2022)", "choices": {"A": "Uterine rupture", "B": "Placenta abruptio", "C": "Placenta previa", "D": "Ruptured ovarian cyst"}, "answer": "A) Uterine rupture", "expl": "จากโจทย์มีประวัติ Previous C/S + labor pain + hemodynamic unstable + absent FHS จึงนึกถึงภาวะ Uterine rupture มากที่สุด / Placenta abruptio : น่าจะมีประวัติปวดท้อง ท้องแข็ง , uterine contraction มาถี่, เลือดออกจากช่องคลอด / Placenta previa : Painless vaginal bleeding / Ruptured ovarian cyst : ปวดท้อง, hemodynamic unstable ได้ แต่ไม่ควรมี absent fetal heart sound", "fig": false, "figNote": "", "dup": ""}, {"no": "305", "seq": 305, "years": ["2022"], "stem": "A 35-year-old, primigravida GA 35 wk presents with generalized tonic-clonic seizure. Her blood pressure is 150/100 mmHg, she denies labor pain. PV: cervical os 3 cm (?), no effacement, station -1, membrane intact. What is the appropriate management? (2022)", "choices": {"A": "IV labetalol", "B": "IV phenytoin", "C": "IV MgSO4", "D": "Emergency Cesarean delivery"}, "answer": "C) IV MgSO4", "expl": "จากโจทย์พบว่ามี Hypertension + Seizure ดังนั้นจึงชวนสงสัยภาวะ Eclampsia มากที่สุด ซึ่งแนวทางการรักษาจะคล้ายคลึงกับภาวะ Preeclampsia with severe features เลย นั่นก็คือต้องให้ MgSO4 stabilize ผู้ป่วยก่อนจ้า", "fig": false, "figNote": "", "dup": ""}, {"no": "306", "seq": 306, "years": ["2022"], "stem": "A primigravida GA 10 weeks woman presents with vaginal bleeding. PV: cervical os 1 cm, no tissues found, no fetal heart rate, crown-lump-length 8 weeks. What is the proper management? (2022)", "choices": {"A": "Follow up ultrasound", "B": "Progesterone", "C": "MVA", "D": "F&C"}, "answer": "C) MVA", "expl": "จากโจทย์ผู้ป่วยมาด้วย 1st trimester bleeding + Open os + no passing tissue ดังนั้นจึงวินิจฉัยว่าเป็น Inevitable abortion จึงควร termination of pregnancy จึงตอบ MVA (ไม่ตอบ F&C เพราะเราไม่ได้ขูดมดลูกแบบแยกส่วน แต่ถ้า choice เป็น D&C อันนี้อาจตอบได้ แต่ก็ไม่ดีเท่า MVA เพราะจะทำให้เกิด intrauterine adhesion มากกว่า) ส่วนเวลาประเมิน CRL แนะนำให้ดูเป็นหน่วย mm ไม่ดู GA เพราะถ้า CRL >7 mm แต่ยังไม่มี fetal cardiac motion แสดงว่าเป็น early pregnancy loss", "fig": false, "figNote": "", "dup": ""}, {"no": "307", "seq": 307, "years": ["2022"], "stem": "25 years-old woman presents with left breast pain 5 days. She has been breastfeeding for 1 month. PE : T 38 °C BP 130/80 PR 80 with 4 cm of red, warm, tenderness, swelling mass at outer quadrant of left breast. U/S: mixed hypo-hyperechoic lesion 5x5x6 cm. Apart from intravenous antibiotics, what is the most appropriate management? (2022)", "choices": {"A": "Cold compression", "B": "Multiple sessions aspiration", "C": "Incision and drainage", "D": "Wide excision"}, "answer": "C) Incision and drainage", "expl": "จากโจทย์ Keyword คือมีก้อนที่เต้านม + US : mixed hypo-hyperechoic lesion 5x5x6 cm ซึ่งเข้าได้กับภาวะ Breast abscess ดังนั้นจึงต้องรักษาด้วยการให้ Empirical ATB 10-14 days + U/S guided percutaneous drainage (ถ้ามี choice แค่นี้ขอตอบ I&D หลักคือต้องระบายหนองออก)", "fig": false, "figNote": "", "dup": ""}, {"no": "308", "seq": 308, "years": ["2022"], "stem": "A middle-aged pregnant woman presents with bleeding per vagina. Physical examination shows opening of cervical os for 1 cm. What is the most likely diagnosis? (2022)", "choices": {"A": "Threatened abortion", "B": "Inevitable abortion", "C": "Complete abortion", "D": "Incomplete abortion", "E": "Missed abortion"}, "answer": "B) Inevitable abortion", "expl": "ดูรูปหน้ว่นไป และจำให้ขึ้นใจจ้า !!", "fig": false, "figNote": "", "dup": ""}, {"no": "309", "seq": 309, "years": ["2023"], "stem": "A 12-week pregnant woman presents with vaginal bleeding. Vaginal examination: os closed. TVS: fetus present without heart sound. What is the diagnosis? (2023)", "choices": {"A": "Inevitable abortion", "B": "Missed abortion", "C": "Incomplete abortion", "D": "Complete abortion", "E": "Threatened abortion"}, "answer": "B) Inevitable abortion", "expl": "เหลือบไปดูเฉลยรูปข้างบน เห็นมั้ยออกอีกแล้ว !!", "fig": true, "figNote": "Above the question is a colored summary box titled 'Spontaneous Abortion' listing Threatened / Incomplete / Complete / Missed / Inevitable abortion definitions (Thai) with os and fetus status", "dup": ""}, {"no": "310", "seq": 310, "years": ["2022"], "stem": "A 32-year-old primigravida pregnant woman came to office for medical advice. She received rubella vaccination 2 weeks ago. Then she found out that she has been pregnant with GA 8 weeks by ultrasound. What is the most appropriate management? (2022)", "choices": {"A": "Reassurance", "B": "Maternal rubella IgG", "C": "Cordocentesis for rubella IgM", "D": "Amniocentesis for rubella PCR", "E": "Termination of pregnancy"}, "answer": "A) Reassurance", "expl": "จากโจทย์ก็คือเผลอฉีด MMR (lived vaccine) ให้หญิงตั้งครรภ์โดยไม่รู้ตัว (ปกติควรเว้น 28 วัน หลังฉีดวัคซีนแล้วค่อยตั้งท้อง) โดยแนวทางการรักษา CDC ได้กล่าวไว้ว่า ยังไม่ได้ต้องตรวจอะไรเพิ่มเติมทันที ให้ reassure แม่ + บอกโอกาส adverse outcome ที่อาจเกิดกับลูกว่าตามทฤษฎีแล้วจะมี anomaly อะไรได้บ้าง แต่ยังไม่ต้องถึงกับรีบยุติการตั้งครรภ์ทันที", "fig": false, "figNote": "", "dup": ""}, {"no": "311", "seq": 311, "years": ["2023"], "stem": "A 32-year-old pregnant mother, primigravida, GA 12 week, comes to ANC clinic due to severe nausea and vomiting. She has no vaginal bleeding or abdominal pain. Physical examination: Fundal height 2/3 above pubic symphysis. Other physical examinations and laboratory investigations are normal. What is the most proper investigation? (2023)", "choices": {"A": "Serum β-hCG level", "B": "75 g OGTT", "C": "Serum electrolytes", "D": "Thyroid function test", "E": "Transabdominal ultrasonography"}, "answer": "A) Reassurance", "expl": "จากโจทย์บอกว่าผู้ป่วย GA 12 wk แต่ตรวจร่างกายมี uterus 16 wk size จึงแปลว่า Size > date ดังนั้นจึงควร TAS เพื่อหาสาเหตุก่อน เนื่องจากเรา Ddx : Twins pregnancy, Molar pregnancy, Myoma, Polyhydramnios, Wrong date เป็นต้น", "fig": false, "figNote": "", "dup": ""}, {"no": "312", "seq": 312, "years": ["2022"], "stem": "A 25-year-old, GA 29 week pregnant woman presented with PROM 4 hours ago. She has no uterine contractions. Pelvic examination: os closed, amniotic fluid leakage. TAS: single viable fetus, no anomalies, FHR 140/min, deep vertical pocket 3 cm. Apart from corticosteroid, what management should be done in this patient? (2022)", "choices": {"A": "ATB for prolong latent phase", "B": "MgSO4 for neuroprotective", "C": "Tocolytic for inhibition", "D": "Oxytocin", "E": "Emergency C/S"}, "answer": "A) ATB for prolong latent phase", "expl": "จากโจทย์เป็น Early PPROM เนื่องจาก GA < 34 wk และยังไม่มีข้อบ่งชี้ให้ต้องคลอด ดังนั้นจึงควรมี mx ? / Dexamethasone for promote lung maturity / Antibiotics for prolong latency period / MgSO4 for neuroprotection : ให้ได้ แต่ให้ในกรณีที่คิดว่าจะคลอดเร็วๆนี้ / Tocolytics : ยังไม่ต้องให้เพราะไม่ได้มี Uterine contraction", "fig": true, "figNote": "Meme image (LINE TV screenshot of screaming person) with Thai caption 'กูจะอ่านหนังสือตอนไหนก็ได้!!!' and 'แต่มึงจะอ่านก่อนเข้าสอบ 2 ชั่วโมง ไม่ได้!!'", "dup": "เลขข้อ 312 ซ้ำในเล่มต้นฉบับ (ข้อนี้เป็นข้อแรก)"}, {"no": "312", "seq": 313, "years": ["2023"], "stem": "A 32 years old female, G2P1 38 wk, presents with severe headache for 60 min. PE : BP 200/105 mmHg, PR 90/min, no uterine contraction. During examination, she develops drowsiness and generalized tonic-clonic seizure. Besides airway management, what is the most appropriate initial management ? (2023)", "choices": {"A": "Nicardipine", "B": "Labetalol", "C": "Methyldopa", "D": "MgSO4", "E": "Diazepam"}, "answer": "D) MgSO4", "expl": "จากโจทย์พบว่ามี Hypertension + Seizure ดังนั้นจึงชวนสงสัยภาวะ Eclampsia มากที่สุด ซึ่งแนวทางการรักษาจะคล้ายคลึงกับภาวะ Preeclampsia with severe features เลย นั่นก็คือต้องให้ MgSO4 stabilize ผู้ป่วยก่อนจ้า", "fig": false, "figNote": "", "dup": "เลขข้อ 312 ซ้ำในเล่มต้นฉบับ (ข้อนี้เป็นข้อที่สอง)"}, {"no": "313", "seq": 314, "years": ["2023"], "stem": "A pregnant woman has just delivered a term newborn female infant by vacuum extraction. She is still bleeding after the 3rd stage of labor. PE : Good uterine tone, fundal height at umbilicus. What is the most likely cause ? (2023)", "choices": {"A": "Vaginal laceration", "B": "Uterine atony", "C": "Retained placenta"}, "answer": "A) Vaginal laceration", "expl": "จากโจทย์เป็น PPH โดยมีประวัติใช้ Vacuum extraction และ good uterine tone แล้วแสดงว่าน่าจะไม่ใช่ uterine atony ดังนั้นสาเหตุที่เป็นไปได้มากที่สุดคือ Vaginal laceration เนื่องจากใช้หัตถการทางช่องทางคลอด", "fig": false, "figNote": "", "dup": ""}, {"no": "314", "seq": 315, "years": ["2024"], "stem": "A 30-year-old woman, 1 week postpartum and exclusively breastfeeding, presents with tender right breast pain localized to the periareolar area. No redness. What is the most likely diagnosis? (2024)", "choices": {"A": "Clogged milk duct", "B": "Breast engorgement", "C": "Mastitis", "D": "Galactocele", "E": "Breast abscess"}, "answer": "A) Clogged milk duct > C) Mastitis", "expl": "จากโจทย์ผู้ป่วยมีอาการเจ็บบริเวณเต้านม 1 ข้าง แต่จุดกดเจ็บดู localize อยู่ที่ periareolar area และยังไม่มีบวมแดง จึงคิดว่าเหมือนภาวะ Clogged milk duct > Mastitis จริงๆภาวะท่อน้ำนมอุดตันถ้าจะให้ชัดอีกนิดอาจคลำได้ก้อนนมเป็น lumpy mass", "fig": false, "figNote": "", "dup": ""}, {"no": "315", "seq": 316, "years": ["2024"], "stem": "A 31-year-old primigravida, at 37 weeks gestation, presents with labor pain. Previous antenatal check-ups were unremarkable. She is experiencing uterine contractions every 2 minutes, each lasting 30 seconds. During examination, there was an accidental membrane rupture, and a cord prolapse was identified. The fetal heart rate (FHR) is recorded at 80 beats per minute. What is the most appropriate management? (2024)", "choices": {"A": "Emergency cesarean section", "B": "Vacuum extraction", "C": "Forceps extraction", "D": "Repositioning the cord", "E": "Observation"}, "answer": "A) Emergency cesarean section", "expl": "จากโจทย์พบว่าผู้ป่วยมีภาวะ Prolapse cord ดังนั้น level น้องๆ ลองดูโจทย์ดีๆนะ / ถ้าถาม Initial management : ควรตอบเอามือดันหัวเด็กไว้ เป็นสิ่งที่เราทำได้ง่ายที่สุด / ถ้าถาม Appropriate / Definite management : ควรตอบ Emergency C/S", "fig": false, "figNote": "", "dup": ""}, {"no": "316", "seq": 317, "years": ["2024"], "stem": "A 30-year-old woman at 39 weeks of gestation presents with labor pain for the past 2 hours. She is now in the second stage of labor, with the baby's head delivered but the anterior shoulder is not delivering, indicating shoulder dystocia. What is the next step in management? (2024)", "choices": {"A": "Fundal pressure", "B": "Pubic symphysis pressure", "C": "Posterior shoulder delivery", "D": "Hyperflex thighs to the abdomen", "E": "Reinsert the head and set up for emergency cesarean section (C/S)"}, "answer": "D) Hyperflex thighs to the abdomen", "expl": "เมื่อเกิด Shoulder dystocia ควรมีการวางแผนการรักษาดังนี้ / Call for HELP !! : OB, PED, Anes / Empty bladder / Widen episiotomy / Maneuver ต่างๆ เพื่อแก้ไขภาวะคลอดติดไหล่ : McRobert's maneuver ยกขามารดา 2 ข้างเอาเข่าชิดหน้าอก คือเป็นการ Flex thigh, Suprapubic pressure, Delivery of posterior shoulder, Rubin maneuver, Wood's corkscrew maneuver และ All-fours (Gaskin) maneuver / ห้ามทำ !! Fundal pressure เนื่องจากจะทำให้ไหล่เข้าไปติด pubic symphysis มากยิ่งขึ้น", "fig": false, "figNote": "", "dup": ""}, {"no": "317", "seq": 318, "years": ["2024"], "stem": "A 34-week pregnant woman, gravida 1, presents with a fluid leak. On physical  appropriate next step in management ? (2024)", "choices": {"A": "Administer methotrexate", "B": "Repeat beta-hCG in 48 hours", "C": "Perform D&C", "D": "Start oral contraceptives", "E": "Perform a pelvic ultrasound"}, "answer": "E) Perform a pelvic ultrasound", "expl": "จากโจทย์พบว่ามีการตั้งครรภ์ ที่ Beta-hCG ยังมีค่า 1,000 ดังนั้นจึงควร US เพื่อดูตำแหน่งของตัวอ่อนว่าอยู่ที่ Intrauterine / Extrauterine หรือไม่เห็นอยู่ที่ไหนเลย", "fig": false, "figNote": "", "dup": ""}, {"no": "320", "seq": 321, "years": ["2024"], "stem": "A 27-year-old female, G2P1, at 16 weeks gestational age presents with vaginal spotting. Ultrasound reveals an intrauterine gestational sac measuring 8 weeks with no fetal pole. What should be done next? (2024)", "choices": {"A": "Perform B-hCG assay", "B": "Dilation and curettage (D&C)", "C": "Follow-up ultrasound in 1 week", "D": "Wait for spontaneous abortion", "E": "Initiate medical abortion"}, "answer": "E) Initiate medical abortion > B) Dilation and curettage (D&C)", "expl": "ข้อนี้แนะนำให้อ่านให้ดีๆว่าเข้าเกณฑ์ Early pregnancy loss หรือไม่ ถ้าเข้าเกณฑ์ควร termination of pregnancy ด้วย medical / surgical แต่ถ้ายังไม่เข้าเกณฑ์ให้ F/U ได้ โดย Criteria มี 4 ข้อดังนี้ / CRL > 7 mm แต่ยังไม่มี fetal heart beat / MSD > 25 mm แต่ยังไม่มี embryo (ดังนั้น GS ก็จะไม่รู้แหละ แต่คิดออกมา GA 8wk มันน่าจะเกิน 25 mm นะ ดังนั้นเวลาอ่านโจทย์ให้หาหน่วย mm) / มี gestational sac + yolk sac --> follow US 11 วัน ยังไม่เห็น embryo + fetal heart / มี gestational sac แต่ไม่มี yolk sac--> follow US 14 วัน ยังไม่มี embryo + fetal heart beat / ดังนั้นพอได้ diagnosis แล้วให้ management ถ้า GA < 9 wk ให้ medical abortion ก็ผลลัพธ์ค่อนข้างดี โอกาสสำเร็จ >90% แถมไม่ต้องเสี่ยงเท่าหัตถการ D&C ด้วย", "fig": true, "figNote": "รูปเด็กทารกกำมือ (success kid meme)", "dup": ""}, {"no": "321", "seq": 322, "years": ["2009"], "stem": "ถาม dose postcoital pill SI 2hr ? (2009)", "choices": {"A": "estradiol 60 mg, next 60 mg in the next 12hr", "B": "estradiol 100 mg, next 100 mg in the const YEARS = ["2009", "2010", "2011", "2012", "2013", "2014", "2015", "2016", "2017", "2018", "2019", "2020", "2021", "2022", "2023", "2024"];

const listEl = document.getElementById('list');
const emptyEl = document.getElementById('empty');
const countEl = document.getElementById('count');
const searchEl = document.getElementById('search');
const chipsEl = document.getElementById('yearchips');
const topBtn = document.getElementById('top');

const ORDER = ['A','B','C','D','E','F'];
let activeYears = new Set();
let noYearActive = false;
let query = '';

function correctSet(answer){
  const s = new Set();
  if(!answer) return s;
  const re = /(?:^|[\s,;\/(])([A-E])\)/g;
  let m;
  while((m = re.exec(answer)) !== null){ s.add(m[1]); }
  return s;
}
function esc(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function cardHTML(q){
  const cs = correctSet(q.answer);
  const yrChips = (q.years||[]).map(y=>`<span class="yr">${y}</span>`).join('');
  const dup = q.dup ? `<span class="dup">${esc(q.dup)}</span>` : '';
  let choices = '';
  for(const L of ORDER){
    if(q.choices && q.choices[L] !== undefined){
      const cls = cs.has(L) ? ' class="correct"' : '';
      choices += `<li${cls}><span class="lt">${L})</span>${esc(q.choices[L])}</li>`;
    }
  }
  const ansCls = cs.size ? 'ans' : 'ans none';
  const ansLine = q.answer ? `<div class="${ansCls}">เฉลย: <b>${esc(q.answer)}</b></div>` : '';
  const expl = q.expl ? `<div class="expl"><span class="lb">คำอธิบาย:</span> ${esc(q.expl)}</div>` : '';
  const fig = q.fig ? `<div class="fig"><b>[ในเล่มมีรูป/ตาราง]</b> ${esc(q.figNote)}</div>` : '';
  const answerBlock = (ansLine || expl || fig) ? `<div class="answer-block">${ansLine}${expl}${fig}</div>` : '';
  return `<div class="card" id="q${q.seq}">
    <div class="qhead"><span class="qno">ข้อ ${esc(q.no)}</span>${yrChips}${dup}</div>
    <div class="stem">${esc(q.stem)}</div>
    ${choices ? `<ul class="choices">${choices}</ul>` : ''}
    ${answerBlock}
  </div>`;
}

function matches(q){
  if(activeYears.size || noYearActive){
    let ok = false;
    if(activeYears.size){
      for(const y of (q.years||[])){ if(activeYears.has(y)){ ok = true; break; } }
    }
    if(!ok && noYearActive && (!q.years || q.years.length===0)) ok = true;
    if(!ok) return false;
  }
  if(query){
    const hay = (q.no + ' ' + q.stem + ' ' + q.expl + ' ' + q.answer + ' ' +
                 Object.values(q.choices||{}).join(' ')).toLowerCase();
    if(!hay.includes(query)) return false;
  }
  return true;
}

function render(){
  const shown = QUESTIONS.filter(matches);
  listEl.innerHTML = shown.map(cardHTML).join('');
  emptyEl.style.display = shown.length ? 'none' : 'block';
  countEl.textContent = `แสดง ${shown.length} / ${QUESTIONS.length} ข้อ`;
}

function buildChips(){
  const all = document.createElement('span');
  all.className = 'chip active'; all.textContent = 'ทั้งหมด'; all.dataset.k = '__all__';
  chipsEl.appendChild(all);
  YEARS.forEach(y=>{
    const c = document.createElement('span');
    c.className = 'chip'; c.textContent = y; c.dataset.k = y;
    chipsEl.appendChild(c);
  });
  const ny = document.createElement('span');
  ny.className = 'chip'; ny.textContent = 'ไม่ระบุปี'; ny.dataset.k = '__none__';
  chipsEl.appendChild(ny);

  chipsEl.addEventListener('click', e=>{
    const chip = e.target.closest('.chip'); if(!chip) return;
    const k = chip.dataset.k;
    if(k === '__all__'){ activeYears.clear(); noYearActive = false; }
    else if(k === '__none__'){ noYearActive = !noYearActive; }
    else { if(activeYears.has(k)) activeYears.delete(k); else activeYears.add(k); }
    const anyFilter = activeYears.size || noYearActive;
    chipsEl.querySelectorAll('.chip').forEach(ch=>{
      const kk = ch.dataset.k;
      if(kk === '__all__') ch.classList.toggle('active', !anyFilter);
      else if(kk === '__none__') ch.classList.toggle('active', noYearActive);
      else ch.classList.toggle('active', activeYears.has(kk));
    });
    render();
  });
}

// reveal / hide toggle
const revealBtn = document.getElementById('reveal');
const revealLbl = document.getElementById('revealLbl');
revealBtn.addEventListener('click', ()=>{
  const on = document.body.classList.toggle('reveal-on');
  revealBtn.setAttribute('aria-pressed', on ? 'true' : 'false');
  revealLbl.innerHTML = on ? 'เปิดเฉลย<small>แตะเพื่อซ่อน</small>' : 'ปิดเฉลย<small>แตะเพื่อดูคำตอบ</small>';
});

searchEl.addEventListener('input', ()=>{ query = searchEl.value.trim().toLowerCase(); render(); });
window.addEventListener('scroll', ()=>{ topBtn.style.display = window.scrollY > 500 ? 'block' : 'none'; });
topBtn.addEventListener('click', ()=> window.scrollTo({top:0, behavior:'smooth'}));

buildChips();
render();
</script>
</body>
</html>
