<text text-anchor="middle" x="110.5" y="-376.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">Resuscitation</text>
<text text-anchor="middle" x="110.5" y="-362.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• ขอความช่วยเหลือ</text>
<text text-anchor="middle" x="110.5" y="-348.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• ประเมิน ABC (ทางเดินหายใจ การหายใจ การไหลเวียน)</text>
<text text-anchor="middle" x="110.5" y="-334.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• ให้ออกซิเจน</text>
<text text-anchor="middle" x="110.5" y="-320.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• ใส่สายสวนปัสสาวะ ติดตามปริมาณปัสสาวะ</text>
<text text-anchor="middle" x="110.5" y="-306.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• เปิดเส้น IV 2 เส้น เข็มเบอร์ 16&#45;18</text>
<text text-anchor="middle" x="110.5" y="-292.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• ให้เลือด/ส่วนประกอบตามข้อบ่งชี้</text>
<text text-anchor="middle" x="110.5" y="-278.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• บันทึกสัญญาณชีพทุก 15 นาที จนคงที่</text>
</g>
