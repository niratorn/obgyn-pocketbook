<text text-anchor="middle" x="407.5" y="-94.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• Bimanual uterine compression</text>
<text text-anchor="middle" x="407.5" y="-80.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• Intrauterine balloon / condom tamponade</text>
<text text-anchor="middle" x="407.5" y="-66.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• Uterine artery embolization</text>
<text text-anchor="middle" x="407.5" y="-52.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• Uterine compression suture</text>
<text text-anchor="middle" x="407.5" y="-38.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• Vessels ligation</text>
<text text-anchor="middle" x="407.5" y="-24.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• Hysterectomy</text>
<text text-anchor="middle" x="407.5" y="-10.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• ถ้ายังมีเลือดออกหลังตัดมดลูก ทำ abdominal packing</text>
</g>
