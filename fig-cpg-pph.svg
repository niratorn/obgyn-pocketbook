<text text-anchor="middle" x="209.5" y="-526.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">เสียเลือด &gt; 500 มล. / ชีพจรเร็ว / ความดันโลหิตตก</text>
<text text-anchor="middle" x="209.5" y="-512.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• เริ่ม resuscitation ทันที</text>
