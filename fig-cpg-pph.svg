<text text-anchor="middle" x="518" y="-89.4" font-family="Sarabun" font-size="12.00">• Bimanual uterine compression</text>
<text text-anchor="middle" x="518" y="-76.4" font-family="Sarabun" font-size="12.00">• Intrauterine balloon / condom tamponade</text>
<text text-anchor="middle" x="518" y="-63.4" font-family="Sarabun" font-size="12.00">• Uterine artery embolization</text>
<text text-anchor="middle" x="518" y="-50.4" font-family="Sarabun" font-size="12.00">• Uterine compression suture</text>
<text text-anchor="middle" x="518" y="-37.4" font-family="Sarabun" font-size="12.00">• Vessels ligation</text>
<text text-anchor="middle" x="518" y="-24.4" font-family="Sarabun" font-size="12.00">• Hysterectomy</text>
<text text-anchor="middle" x="518" y="-11.4" font-family="Sarabun" font-size="12.00">• ถ้ายังมีเลือดออกหลังตัดมดลูก ทำ abdominal packing</text>
