<text text-anchor="middle" x="130" y="-361.4" font-family="Sarabun" font-size="12.00">Resuscitation</text>
<text text-anchor="middle" x="130" y="-348.4" font-family="Sarabun" font-size="12.00">• ขอความช่วยเหลือ</text>
<text text-anchor="middle" x="130" y="-335.4" font-family="Sarabun" font-size="12.00">• ประเมิน ABC (ทางเดินหายใจ การหายใจ การไหลเวียน)</text>
<text text-anchor="middle" x="130" y="-322.4" font-family="Sarabun" font-size="12.00">• ให้ออกซิเจน</text>
<text text-anchor="middle" x="130" y="-309.4" font-family="Sarabun" font-size="12.00">• ใส่สายสวนปัสสาวะ ติดตามปริมาณปัสสาวะ</text>
<text text-anchor="middle" x="130" y="-296.4" font-family="Sarabun" font-size="12.00">• เปิดเส้น IV 2 เส้น เข็มเบอร์ 16&#45;18</text>
<text text-anchor="middle" x="130" y="-283.4" font-family="Sarabun" font-size="12.00">• ให้เลือด/ส่วนประกอบตามข้อบ่งชี้</text>
<text text-anchor="middle" x="130" y="-270.4" font-family="Sarabun" font-size="12.00">• บันทึกสัญญาณชีพทุก 15 นาที จนคงที่</text>
</g>
