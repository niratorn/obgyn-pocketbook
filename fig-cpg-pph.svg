<text text-anchor="middle" x="407.5" y="-207.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• oxytocin 20&#45;40 ยูนิต ในสารน้ำ 1 ลิตร 60 หยด/นาที</text>
<text text-anchor="middle" x="407.5" y="-193.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• ถ้าไม่ตอบสนอง ให้ uterotonic drugs ชนิดอื่น</text>
<text text-anchor="middle" x="407.5" y="-179.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• TXA 1 กรัม IV นานกว่า 10 นาที (ถ้าไม่มีข้อห้าม)</text>
<text text-anchor="middle" x="407.5" y="-165.6" font-family="Sarabun, 'TH Sarabun New', Tahoma, sans-serif" font-size="13.00">• นวดคลึงมดลูก</text>
</g>
